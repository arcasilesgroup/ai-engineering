sonar.projectKey={project_key}
sonar.organization={organization}
sonar.host.url={host_url}

# Quality Gate — scanner polls and fails if QG fails (D038-001)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Sources and tests
sonar.sources={sources}
sonar.tests={tests}
sonar.exclusions=**/node_modules/**,**/*.pyc,**/__pycache__/**,**/dist/**,**/.venv/**

# Coverage report paths (stack-aware, unused paths are silently ignored)
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.11
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Action Version Manifest — SHA pins for GitHub Actions
#
# Third-party actions must be SHA-pinned per DEC-054-01.
# First-party actions (actions/*) may use major version tags.
# Dependabot can propose updates to this file.
#
# Format:
#   <owner/action>:
#     version: human-readable version tag
#     sha: full 40-char commit SHA (null for first-party tag-only)

actions/checkout:
  version: "v4"
  sha: null  # first-party: major tag acceptable

actions/upload-artifact:
  version: "v4"
  sha: null

actions/download-artifact:
  version: "v4"
  sha: null


schema_version: "2.0"
framework_version: "0.2.0"

update_metadata:
  rationale: "plan/execute split: 7 agents (extract execution coordination from plan), 34 skills (add advisory plan skill)"
  expected_gain: "structural boundary between planning and execution; human as natural gate; clean SRP per agent"
  potential_impact: "/ai:plan now STOPS before execution; user must invoke /ai:execute separately"

metadata:
  name: "ai-engineering"
  description: "AI governance framework with mandatory local enforcement, observability, and DevSecOps"
  updated: "2026-03-04"

governance_surface:
  agents:
    total: 7
    names: [plan, execute, build, scan, release, write, observe]
  skills:
    total: 34
    organization: flat
    prefix: "ai:"
  integrity:
    patterns_category_present: false
    orphan_skills: 0

work_items:
  enabled: true
  primary: "github-projects"
  sources:
    - type: "github-projects"
      project: "https://github.com/orgs/arcasilesgroup/projects/4"
      labels_ready: ["ready", "agent-ready"]
      labels_priority: ["p1-critical", "p2-high", "p3-normal"]
    - type: "github-issues"
      labels_ready: ["ready", "agent-ready"]
    - type: "azure-boards"
      project: null
      query_ready: "[System.Tags] CONTAINS 'agent-ready'"
  sync:
    direction: bidirectional
    on_spec_create: create_linked_issue
    on_spec_close: close_linked_issue
    on_task_complete: update_sub_issue

ownership:
  root: ".ai-engineering"
  model:
    framework_managed:
      - "standards/framework/**"
      - "skills/**"
      - "agents/**"
    team_managed:
      - "standards/team/**"
    project_managed:
      - "context/**"
    system_managed:
      - "state/install-manifest.json"
      - "state/ownership-map.json"
      - "state/sources.lock.json"
      - "state/decision-store.json"
      - "state/audit-log.ndjson"
      - "state/session-checkpoint.json"
  external_framework_managed:
    - "AGENTS.md"
    - "CLAUDE.md"
    - ".github/copilot-instructions.md"
    - ".github/instructions/**"
    - ".github/copilot/code-generation.md"
    - ".github/copilot/test-generation.md"
    - ".github/copilot/code-review.md"
    - ".github/copilot/commit-message.md"
    - ".github/prompts/**"
    - ".github/agents/**"
    - ".claude/settings.json"
    - ".claude/commands/**"

standards:
  precedence:
    - "standards/framework/core.md"
    - "standards/framework/stacks/<stack>.md"
    - "standards/team/core.md"
    - "standards/team/stacks/<stack>.md"
  non_negotiables:
    - "mandatory_local_enforcement"
    - "no_direct_commits_to_main_or_master"
    - "protected_branch_push_block"
    - "no_policy_weakening_without_risk_acceptance"

commands:
  commit:
    default: ["stage", "commit", "push_current_branch"]
    only: ["stage", "commit"]
  pr:
    default:
      [
        "stage",
        "commit",
        "push_current_branch",
        "create_pr",
        "enable_pr_auto_complete",
      ]
    only: ["create_pr"]
    when_branch_not_pushed:
      severity: "warning"
      propose_auto_push: true
      continue_modes: ["defer-pr", "attempt-pr-anyway", "export-pr-payload"]
  management:
    stack: ["add", "remove", "list"]
    ide: ["add", "remove", "list"]

providers:
  vcs:
    primary: "github"
    enabled: ["github"]
    extensions:
      azure_devops:
        enabled: false
        organization: null
        project: null
        repository: null
        constraints:
          branch_name_required: true
          work_item_link_optional: true

tooling:
  required:
    python: ["uv", "ruff", "ty", "pip-audit"]
    dotnet: ["dotnet"]
    nextjs: ["node", "npm"]
    security: ["gitleaks", "semgrep"]
    vcs_cli: ["gh", "az"]
  optional:
    dast: ["zap-cli", "nuclei"]
    container: ["trivy"]
    sbom: ["cyclonedx-py", "cyclonedx-dotnet", "cdxgen"]
  readiness:
    require_install: true
    require_configuration: true
    require_auth_when_applicable: true

enforcement:
  hooks:
    non_bypassable: true
    required: ["pre-commit", "commit-msg", "pre-push"]
  ci:
    required_workflows: ["ci", "ai-pr-review", "ai-eng-gate"]
    block_on_findings: ["high", "critical"]
  checks:
    pre_commit:
      common: ["gitleaks"]
      python: ["ruff-format", "ruff-lint"]
      dotnet: ["dotnet-format"]
      nextjs: ["prettier-check", "eslint"]
    pre_push:
      common: ["semgrep"]
      python: ["pip-audit", "stack-tests", "ty-check"]
      dotnet: ["dotnet-build", "dotnet-test", "dotnet-vuln"]
      nextjs: ["tsc-check", "vitest", "npm-audit"]

pipelines:
  full:
    steps: [discover, architecture, risk, test-plan, spec, dispatch]
    gates: [spec-required, user-approval-before-dispatch]
    triggers: [new-feature, refactor, governance-change]
  standard:
    steps: [discover, risk, spec, dispatch]
    gates: [spec-required]
    triggers: [enhancement]
  hotfix:
    steps: [discover, risk, dispatch]
    gates: [risk-acknowledged]
    triggers: [bug-fix, security-patch]
  trivial:
    steps: [dispatch]
    gates: []
    triggers: [typo, comment, single-line]

observability:
  event_store: "state/audit-log.ndjson"
  rotation: weekly
  archive_pattern: "state/audit-archive/audit-YYYY-WW.ndjson"
  retention_days: 90
  audiences: [engineer, team, ai]
  dora_enabled: true

remote_skills:
  enabled: true
  sources:
    - "https://skills.sh/"
    - "https://www.aitmpl.com/skills"
  trust_policy:
    allowlist_only: true
    checksums_required: true
    allow_null_checksums_before_first_sync: true
    signature_metadata_required: true
    remote_execution_allowed: false
  cache:
    ttl_hours: 24
    offline_fallback: true
    lock_file: ".ai-engineering/state/sources.lock.json"

risk_acceptance:
  remediation:
    suggest_patch: true
    auto_apply: false
  persistence:
    decision_store: ".ai-engineering/state/decision-store.json"
    audit_log: ".ai-engineering/state/audit-log.ndjson"
  reprompt_conditions:
    - "decision_expired"
    - "scope_changed"
    - "severity_changed"
    - "policy_changed"
    - "material_context_hash_changed"

telemetry:
  mode: "strict_opt_in"
  default_enabled: false

agentic:
  model: "session_scoped"
  parallel_execution: true
  session_contract:
    start_sequence:
      - "context/specs/_active.md"
      - "<active_spec>/spec.md"
      - "<active_spec>/tasks.md"
      - "state/decision-store.json"
      - "state/session-checkpoint.json"
    commit_format: "spec-{spec_id}: Task {task_id} — {description}"
    close_actions:
      - "update_task_checkboxes"
      - "update_tasks_frontmatter"
      - "validate_content_integrity"
      - "save_session_checkpoint"
      - "report_summary"
  branch_strategy:
    integration_branch_pattern: "<spec_branch>"
    phase_branch_pattern: "<spec_branch>-phase-{phase_number}"
    serial_phases: "work_on_integration_branch"
    parallel_phases: "work_on_phase_branch"
    merge_protocol: "rebase_before_merge"
  phase_gates:
    required:
      - "all_tasks_checked"
      - "branch_merged_if_parallel"
      - "quality_checks_pass"
      - "decisions_recorded"
    serial_block: true
  decision_continuity:
    store: "state/decision-store.json"
    context_hash: "sha256"
    reprompt_conditions:
      - "decision_expired"
      - "scope_changed"
      - "severity_changed"
      - "policy_changed"
      - "material_context_hash_changed"

context_optimization:
  policy: "strict_efficiency_no_hard_category_caps"
  required_fields_per_update: ["rationale", "expected_gain", "potential_impact"]
  maintenance_agent:
    cadence: "weekly"
    output_mode: "local_report_first"
    pr_after_approval: true

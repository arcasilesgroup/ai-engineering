# ai-engineering manifest

# === USER CONFIGURATION ===
# Edit this section to match your project and organization.

schema_version: "2.0"
framework_version: "0.4.0"
name: ai-engineering
version: "1.0.0"

# Providers
providers:
  vcs: github
  ides: [terminal]
  stacks: [python]

# AI Providers
ai_providers:
  enabled: [claude_code, github_copilot, gemini, codex]
  primary: claude_code

# Artifact feeds — configure your private feed in pyproject.toml [tool.uv.index]
# See the commented section in pyproject.toml for instructions.
artifact_feeds:
  python: pyproject.toml  # pointer to actual config location

# Work items — board/issue tracker integration
# Configure your team's area path (Azure DevOps) or team label (GitHub Issues).
# Both provider configs are always present — switching is a one-line change.
work_items:
  provider: github # 'github' or 'azure_devops'
  azure_devops:
    area_path: "Project\\TeamName"
    # iteration_path: auto-detected from current sprint
  github:
    team_label: "team:core"
  state_mapping:
    refinement: null
    ready: null
    in_progress: null
    in_review: null
    done: null
  process_template: null
  custom_fields: []
  github_project:
    owner: null  # GitHub org or user that owns the project board
    number: null
    status_field_id: null
    status_options: {}
  hierarchy:
    feature: never_close # features are never closed by AI
    user_story: close_on_pr # closed when PR merges
    task: close_on_pr
    bug: close_on_pr

# Quality gates
quality:
  coverage: 80
  duplication: 3
  cyclomatic: 10
  cognitive: 15

# Gate execution mode (spec-105 D-105-02)
# - regulated (default): runs Tier 0 + Tier 1 + Tier 2 (full surface).
# - prototyping: skips Tier 2 governance checks for fast iteration on
#   feature branches; branch-aware + CI override + pre-push target checks
#   automatically escalate back to regulated when leaking is detected.
# pre_commit.auto_stage (spec-105 D-105-09):
# - true (default): orchestrator + Claude hook re-stage S_pre & M_post
#   after Wave 1 fixers; never touches files outside S_pre.
# - false: files modified by fixers stay unstaged; operator stages manually.
gates:
  mode: regulated
  pre_commit:
    auto_stage: true

# Documentation auto-update
# readme: true — recursively scans ALL README*.md files (root + subdirectories)
#   and updates each in context of its directory.
# changelog: true — keeps CHANGELOG.md current with each PR.
# solution_intent: true — syncs docs/solution-intent.md on architecture changes.
documentation:
  auto_update:
    readme: true
    changelog: true
    solution_intent: true
  external_portal:
    enabled: false
    source: null
    update_method: "pr"

# CI/CD standards
# Set standards_url to your team's CI/CD documentation.
# /ai-pipeline reads this URL to generate compliant pipelines.
cicd:
  standards_url: null

# Context loading precedence
# When conventions from different context layers conflict,
# the first layer in the list wins (team overrides framework, framework overrides language).
contexts:
  precedence: [team, frameworks, languages]

# === FRAMEWORK MANAGED (do not edit below this line) ===
# These sections are maintained by ai-engineering automatically.

# Skills registry (48 skills)
skills:
  total: 48
  prefix: "ai-"
  registry:
    # Core workflow
    ai-brainstorm: { type: workflow, tags: [planning] }
    ai-plan: { type: workflow, tags: [planning] }
    ai-dispatch: { type: workflow, tags: [execution] }
    ai-test: { type: workflow, tags: [quality] }
    ai-debug: { type: workflow, tags: [quality] }
    ai-code: { type: workflow, tags: [implementation] }
    ai-verify: { type: workflow, tags: [quality] }
    ai-review: { type: workflow, tags: [quality] }
    # Delivery
    ai-commit: { type: delivery, tags: [git] }
    ai-pr: { type: delivery, tags: [git] }
    ai-release-gate: { type: delivery, tags: [release] }
    ai-cleanup: { type: delivery, tags: [git] }
    # Enterprise
    ai-security: { type: enterprise, tags: [security] }
    ai-governance: { type: enterprise, tags: [compliance] }
    ai-pipeline: { type: enterprise, tags: [cicd] }
    ai-schema: { type: enterprise, tags: [database] }
    ai-docs: { type: enterprise, tags: [documentation, architecture, governance] }
    # Teaching + Writing
    ai-explain: { type: teaching, tags: [learning] }
    ai-guide: { type: teaching, tags: [onboarding] }
    ai-write: { type: writing, tags: [content] }
    ai-market: { type: writing, tags: [marketing, go-to-market] }
    # SDLC
    ai-note: { type: sdlc, tags: [knowledge] }
    ai-standup: { type: sdlc, tags: [reporting] }
    ai-sprint: { type: sdlc, tags: [planning, presentation] }
    ai-postmortem: { type: sdlc, tags: [incident] }
    ai-support: { type: sdlc, tags: [customer] }
    ai-resolve-conflicts: { type: sdlc, tags: [git] }
    # Meta
    ai-create: { type: meta, tags: [framework] }
    ai-learn: { type: meta, tags: [improvement] }
    ai-prompt: { type: meta, tags: [optimization] }
    ai-start: { type: meta, tags: [bootstrap] }
    ai-analyze-permissions: { type: meta, tags: [permissions] }
    ai-instinct: { type: meta, tags: [meta, learning, continuous-improvement] }
    ai-autopilot: { type: meta, tags: [orchestration, autonomous, multi-spec] }
    ai-run: { type: meta, tags: [orchestration, autonomous, backlog, no-hitl] }
    ai-constitution: { type: meta, tags: [governance] }
    # ECC Integration (spec-062)
    ai-slides: { type: writing, tags: [presentation, html, css] }
    ai-media: { type: writing, tags: [media, generation] }
    ai-video-editing: { type: writing, tags: [video, editing] }
    ai-eval: { type: workflow, tags: [quality, evals] }
    # Board integration
    ai-board-discover: { type: enterprise, tags: [board, discovery] }
    ai-board-sync: { type: enterprise, tags: [board, sync] }
    # Platform governance
    ai-platform-audit: { type: enterprise, tags: [audit, platform, governance] }
    ai-skill-evolve: { type: meta, tags: [improvement, skills, optimization] }
    # Security (spec-107)
    ai-mcp-sentinel: { type: enterprise, tags: [security, mcp, audit, sentinel, governance] }
    # Design (spec-093)
    ai-design: { type: design, tags: [design, ui, ux, aesthetic] }
    ai-animation: { type: design, tags: [animation, motion, interaction] }
    ai-canvas: { type: design, tags: [visual, art, composition, marketing] }

# Agents (10)
agents:
  total: 10
  names: [plan, build, verify, guard, review, explore, guide, simplify, autopilot, run-orchestrator]

# Ownership
ownership:
  framework: [".claude/skills/**", ".claude/agents/**", ".ai-engineering/**", ".github/agents/**", ".github/skills/**", ".github/hooks/**", ".github/copilot-instructions.md", ".codex/**", ".gemini/**"]
  team: [".ai-engineering/contexts/team/**"]
  system: [".ai-engineering/state/**"]

# Tooling
tooling: [uv, ruff, gitleaks, pytest, ty, pip-audit]

# Telemetry
telemetry:
  consent: strict-opt-in
  default: disabled

# === SPEC-101 INSTALL CONFIGURATION ===
# User-edited install configuration for `ai-eng install` / `ai-eng doctor --fix`.
# Placed at end-of-file so the spec-101 required_tools governance lint can
# parse the block correctly (the lint's indent normaliser scans every line
# after `required_tools:` — siblings at column 0 confuse it). Keep
# `required_tools:` as the LAST top-level key in this file.

# Prereqs — hard prerequisites the user must install before `ai-eng install`
# (spec-101 D-101-14). `uv` covers the framework's own Python tool install
# path; `sdk_per_stack` covers the 9 stacks whose toolchains the framework
# never auto-installs (NG-11). Missing prereqs surface as EXIT 81.
prereqs:
  uv:
    version_range: ">=0.4.0,<1.0"
  sdk_per_stack:
    java: {name: JDK, min_version: "21", install_link: "https://adoptium.net/"}
    kotlin: {name: JDK, min_version: "21", install_link: "https://adoptium.net/"}
    swift: {name: Swift toolchain, install_link: "https://www.swift.org/install/"}
    dart: {name: Dart SDK, install_link: "https://dart.dev/get-dart"}
    csharp: {name: ".NET SDK", min_version: "9", install_link: "https://dotnet.microsoft.com/download"}
    go: {name: Go toolchain, install_link: "https://go.dev/dl/"}
    rust: {name: Rust toolchain, install_link: "https://rustup.rs/"}
    php: {name: PHP, min_version: "8.2", install_link: "https://www.php.net/downloads"}
    cpp: {name: clang/LLVM, install_link: "https://llvm.org/builds/"}

# Python environment mode (spec-101 D-101-12). `uv-tool` (default) installs
# Python tools to `~/.local/share/uv/tools/` so worktree creation never
# triggers a `.venv/` re-install. Alternatives: `venv` (legacy, per-cwd
# `.venv/`) and `shared-parent` (worktree-aware, requires a git repo).
python_env:
  mode: uv-tool

# Required tools — single source of truth for `ai-eng install` / `ai-eng doctor --fix`
# (spec-101 D-101-01). Covers a universal `baseline` plus per-stack tools for the
# 14 declared stacks. `platform_unsupported` (tool-level, max 2 of 3 OSes) and
# `platform_unsupported_stack` (stack-level, may list all 3) are governed by
# D-101-03 + D-101-13 — both require `unsupported_reason`. MUST be the last
# top-level key in this file (see lint-normaliser note above).
required_tools:
  baseline:
    - {name: gitleaks}
    - {name: semgrep, platform_unsupported: [windows], unsupported_reason: "semgrep has no Windows release"}
    - {name: jq}
  python:
    - {name: ruff}
    - {name: ty}
    - {name: pip-audit}
    - {name: pytest, scope: user_global}
  typescript:
    - {name: prettier, scope: project_local}
    - {name: eslint, scope: project_local}
    - {name: tsc, scope: project_local}
    - {name: vitest, scope: project_local}
  javascript:
    - {name: prettier, scope: project_local}
    - {name: eslint, scope: project_local}
    - {name: vitest, scope: project_local}
  java:
    - {name: checkstyle}
    - {name: google-java-format}
  csharp:
    - {name: dotnet-format}
  go:
    - {name: staticcheck}
    - {name: govulncheck}
  php:
    - {name: phpstan}
    - {name: php-cs-fixer}
    - {name: composer}
  rust:
    - {name: cargo-audit}
  kotlin:
    - {name: ktlint}
  swift:
    platform_unsupported_stack: [linux, windows]
    unsupported_reason: "swiftlint and swift-format have no Linux/Windows binaries"
    tools:
      - {name: swiftlint}
      - {name: swift-format}
  dart:
    - {name: dart-stack-marker}
  sql:
    - {name: sqlfluff}
  bash:
    - {name: shellcheck}
    - {name: shfmt}
  cpp:
    - {name: clang-tidy}
    - {name: clang-format}
    - {name: cppcheck}

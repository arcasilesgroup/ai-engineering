# ai-engineering manifest

# === USER CONFIGURATION ===
# Edit this section to match your project and organization.

schema_version: "2.0"
framework_version: "0.4.0"
name: ai-engineering
version: "1.0.0"

# Providers
providers:
  vcs: github
  ides: [terminal]
  stacks: [python]
  ai_providers:
    enabled: [claude_code, github_copilot]
    primary: claude_code

# AI Providers
ai_providers:
  enabled: [claude_code, github_copilot]
  primary: claude_code

# Artifact feeds — configure your private feed in pyproject.toml [tool.uv.index]
# See the commented section in pyproject.toml for instructions.
artifact_feeds:
  python: pyproject.toml  # pointer to actual config location

# Work items — board/issue tracker integration
# Configure your team's area path (Azure DevOps) or team label (GitHub Issues).
# Both provider configs are always present — switching is a one-line change.
work_items:
  provider: github # 'github' or 'azure_devops'
  azure_devops:
    area_path: "Project\\TeamName"
    # iteration_path: auto-detected from current sprint
  github:
    team_label: "team:core"
    # project: optional GitHub project number
  hierarchy:
    feature: never_close # features are never closed by AI
    user_story: close_on_pr # closed when PR merges
    task: close_on_pr
    bug: close_on_pr

# Quality gates
quality:
  coverage: 80
  duplication: 3
  cyclomatic: 10
  cognitive: 15

# Documentation auto-update
# readme: true — recursively scans ALL README*.md files (root + subdirectories)
#   and updates each in context of its directory.
# changelog: true — keeps CHANGELOG.md current with each PR.
# solution_intent: true — syncs docs/solution-intent.md on architecture changes.
documentation:
  auto_update:
    readme: true
    changelog: true
    solution_intent: true
  external_portal:
    enabled: false
    source: null
    update_method: "pr"

# CI/CD standards
# Set standards_url to your team's CI/CD documentation.
# /ai-pipeline reads this URL to generate compliant pipelines.
cicd:
  standards_url: null  # optional, set during install or edit manually

# === FRAMEWORK MANAGED (do not edit below this line) ===
# These sections are maintained by ai-engineering automatically.

# Skills registry (38 skills)
skills:
  total: 38
  prefix: "ai-"
  registry:
    # Core workflow
    ai-brainstorm: { type: workflow, tags: [planning] }
    ai-plan: { type: workflow, tags: [planning] }
    ai-dispatch: { type: workflow, tags: [execution] }
    ai-test: { type: workflow, tags: [quality] }
    ai-debug: { type: workflow, tags: [quality] }
    ai-verify: { type: workflow, tags: [quality] }
    ai-review: { type: workflow, tags: [quality] }
    # Delivery
    ai-commit: { type: delivery, tags: [git] }
    ai-pr: { type: delivery, tags: [git] }
    ai-release: { type: delivery, tags: [release] }
    ai-cleanup: { type: delivery, tags: [git] }
    # Enterprise
    ai-security: { type: enterprise, tags: [security] }
    ai-governance: { type: enterprise, tags: [compliance] }
    ai-pipeline: { type: enterprise, tags: [cicd] }
    ai-schema: { type: enterprise, tags: [database] }
    ai-solution-intent: { type: enterprise, tags: [documentation] }
    # Teaching + Writing
    ai-explain: { type: teaching, tags: [learning] }
    ai-guide: { type: teaching, tags: [onboarding] }
    ai-write: { type: writing, tags: [docs] }
    # SDLC
    ai-note: { type: sdlc, tags: [knowledge] }
    ai-standup: { type: sdlc, tags: [reporting] }
    ai-sprint: { type: sdlc, tags: [planning] }
    ai-sprint-review: { type: sdlc, tags: [presentation, reporting] }
    ai-postmortem: { type: sdlc, tags: [incident] }
    ai-support: { type: sdlc, tags: [customer] }
    ai-resolve-conflicts: { type: sdlc, tags: [git] }
    # Meta
    ai-create: { type: meta, tags: [framework] }
    ai-learn: { type: meta, tags: [improvement] }
    ai-prompt: { type: meta, tags: [optimization] }
    ai-onboard: { type: meta, tags: [bootstrap] }
    ai-analyze-permissions: { type: meta, tags: [permissions] }
    ai-instinct: { type: meta, tags: [meta, learning, continuous-improvement] }
    ai-autopilot: { type: meta, tags: [orchestration, autonomous, multi-spec] }
    ai-project-identity: { type: meta, tags: [governance] }
    # ECC Integration (spec-062)
    ai-slides: { type: writing, tags: [presentation, html, css] }
    ai-media: { type: writing, tags: [media, generation] }
    ai-video-editing: { type: writing, tags: [video, editing] }
    ai-eval: { type: workflow, tags: [quality, evals] }

# Agents (9)
agents:
  total: 9
  names: [plan, build, verify, guard, review, explore, guide, simplify, autopilot]

# Ownership
ownership:
  framework: [".claude/skills/**", ".claude/agents/**", ".ai-engineering/**", ".github/agents/**", ".github/skills/**", ".github/hooks/**", ".github/copilot-instructions.md", ".agents/**"]
  team: [".ai-engineering/contexts/team/**"]
  system: [".ai-engineering/state/**"]

# Tooling
tooling: [uv, ruff, gitleaks, pytest, ty, pip-audit]

# Telemetry
telemetry:
  consent: strict-opt-in
  default: disabled

schemaVersion: '2.0'
corrections:
- pattern: Brainstorm interrogation questions must be self-explanatory to non-engineers
  trigger: User says 'no entiendo' or asks for clarification on a brainstorm question
  action: When presenting options during brainstorm interrogation, explain each option in plain language with concrete consequences. Avoid technical jargon unless the user has demonstrated comfort with
    it.
  relatedSkill: ai-brainstorm
  diagnostic: no entiendo muy bien que debo responder
  skillIssue: Question about rglob audit used terminology (traversal bug, shared helper, inline fix) without explaining what each option means in practice.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Lead with recommendation when presenting approach options
  trigger: User asks 'which do you recommend?' after seeing 2-3 options without a recommendation
  action: When presenting 2-3 approaches in brainstorm, include a recommendation with rationale. The user can still choose differently, but starting without an opinion wastes a round-trip.
  relatedSkill: ai-brainstorm
  diagnostic: cual me recomendáis?
  skillIssue: Brainstorm SKILL.md says 'present 2-3 options with trade-offs' but doesn't say to recommend one. The user expected guidance, not just a menu.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Confundir telemetría mecánica (hooks) con observación behavioral (LLM)
  trigger: Afirmar que un sistema funciona basándose solo en que los hooks escriben datos
  action: Distinguir explícitamente entre datos mecánicos (hook captures) y análisis del LLM (corrections, proposals). Solo porque los hooks escriben no significa que el sistema cumple su propósito.
  relatedSkill: ai-instinct
  diagnostic: no funciona lo de /ai-instinct, aquí no está escribiendo nunca
  skillIssue: ai-instinct listening mode es puramente behavioral del LLM, no mecánico. Los hooks capturan tool sequences pero las corrections requieren LLM analysis.
  confidence: 0.85
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: Proponer skill del framework cuando existe un skill externo equivalente
  trigger: User asks to run a specific external skill (e.g., skill-sharpen) and the AI substitutes a project skill (e.g., ai-skill-evolve)
  action: When the user names a specific tool or skill, use THAT tool. Do not substitute with a framework-internal alternative unless the user agrees. External skills (e.g., from ~/.agents/skills/) have
    different processes and outputs.
  relatedSkill: ai-brainstorm
  diagnostic: No quiero que uses la skill-sharpen que está como skills.sh
  skillIssue: AI assumed project's ai-skill-evolve was equivalent to the external skill-sharpen. They have different diagnostic processes.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: No abreviar elementos de marca del producto sin aprobación
  trigger: 'Proponer versiones cortas de nombres de marca (ej: ''eng'' en vez de ''engineering'')'
  action: Usar siempre el nombre completo de marca. No abreviar por cuenta propia.
  relatedSkill: ai-design
  diagnostic: User corrected { ai } eng to { ai } engineering
  skillIssue: Design proposal abbreviated brand name without asking
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Añadir spacing vertical alrededor de banners/headers CLI
  trigger: Implementar elementos de branding en output CLI sin líneas vacías
  action: Siempre con.print() antes y después de banners. El output no debe pegarse al prompt ni al contenido.
  relatedSkill: ai-code
  diagnostic: 'User corrected twice: no top spacing, then no bottom spacing'
  skillIssue: CLI branding needs breathing room not obvious until seen in terminal
  confidence: 0.5
  evidenceCount: 2
  domain: stack
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Verificar comandos especiales al añadir output global en CLI callback
  trigger: Añadir output en app-level callback que afecta todos los subcomandos
  action: Revisar si algún subcomando ya tiene su propio display. Skipear output global para esos.
  relatedSkill: ai-code
  diagnostic: ai-eng version showed banner + logo + text = 3 redundant outputs
  skillIssue: Global callback output stacks with command-specific output
  confidence: 0.3
  evidenceCount: 1
  domain: stack
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Proponer texto estático cuando se necesita una acción concreta
  trigger: Proponer inline text en CLAUDE.md como solución para algo que requiere skill invocation
  action: Preferir skill invocation (genera compromiso activo) sobre texto estático (es ruido de fondo entre cientos de instrucciones).
  relatedSkill: ai-brainstorm
  diagnostic: esto porque crees que va a funcionar? no es mejor decir /ai-instinct?
  skillIssue: Texto estático no genera cambio de comportamiento. La invocación de un skill crea una acción concreta en la sesión.
  confidence: 0.85
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: Diseñar feature solo para un provider cuando el framework es multi-provider
  trigger: Proponer solución que solo menciona GitHub cuando manifest soporta GitHub + Azure DevOps
  action: Siempre verificar work_items.provider en manifest y diseñar para ambos providers. El framework usa VcsProvider abstraction.
  relatedSkill: ai-brainstorm
  diagnostic: recuerda tiene que funcionar con azure boards y github issues
  skillIssue: Solo mencioné GitHub en el board display. El framework es multi-provider por diseño.
  confidence: 0.85
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: Verify skill prerequisites before recommending for zero-prerequisite onboarding
  trigger: Suggesting a skill as a first-contact demo that requires preconditions (e.g., existing code changes, active spec)
  action: Check that recommended skills for first 5 minutes or onboarding scenarios have zero prerequisites. Prefer skills that work on any existing codebase without prior framework usage.
  relatedSkill: ai-brainstorm
  diagnostic: 'User corrected /ai-commit suggestion: esto no porque para /ai-commit tiene que haber cambios no??'
  skillIssue: Brainstorm proposed a skill requiring uncommitted changes as a zero-prerequisite demo.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: For onboarding first-contact, prefer holistic tools over point tools
  trigger: Choosing between a point tool (explain one file) and a holistic tool (guide tour entire project) for first impression
  action: Use /ai-guide tour (maps entire project architecture) over /ai-explain (explains a single file/function) for onboarding. First contact should show breadth and capability, not depth on a single
    artifact.
  relatedSkill: ai-brainstorm
  diagnostic: 'User corrected: seria mejor /ai-guide no? mas que /ai-explain?'
  skillIssue: Brainstorm defaulted to a point tool when a holistic alternative existed that better serves the onboarding use case.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
recoveries:
- pattern: Edit tool fails after linter modifies file between read and edit
  trigger: Edit tool returns File has been modified since read error
  action: Re-read the file immediately, then re-apply the edit. Batch edits to minimize linter race window.
  relatedSkill: ai-dispatch
  diagnostic: File has been modified since read, either by the user or by a linter
  skillIssue: Sequential edits to the same file race with auto-formatting linters.
  confidence: 0.5
  evidenceCount: 2
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: sync_command_mirrors.py overwrites manual edits from stale templates
  trigger: Running sync after editing IDE files manually without updating the source templates
  action: Always update source templates FIRST (src/ai_engineering/templates/project/), then run sync. Sync regenerates GEMINI.md and copilot-instructions.md from templates, not from working copies.
  relatedSkill: ai-dispatch
  diagnostic: Sync script overwrote manual GEMINI.md edits with stale template content
  skillIssue: GEMINI.md is generated from src/ai_engineering/templates/project/GEMINI.md, not copied from the root file. Manual edits to root GEMINI.md are lost on next sync.
  confidence: 0.85
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: Board display commands need explicit owner from manifest config
  trigger: gh project item-list requires --owner flag and defaults to repo owner instead of org
  action: Read github_project.owner from manifest.yml. When owner is null, detect from git remote via gh repo view --json owner. Never guess owner from the authenticated user.
  relatedSkill: ai-start
  diagnostic: User showed screenshot of 26 board items on org project but /ai-start only found 1 item on personal project — wrong --owner
  skillIssue: github_project had no owner field. Skills used vague <owner> placeholder, causing board queries to hit wrong project.
  confidence: 0.5
  evidenceCount: 2
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: SonarCloud new-code coverage gate fails marginally on large PRs
  trigger: SonarCloud quality gate reports 79-80% coverage on new code for PRs with many new Python files
  action: Run pytest --cov on the specific uncovered files, identify new lines without coverage, add focused edge-case tests for those paths. Target 5-10% uplift in the uncovered module.
  relatedSkill: ai-pr
  diagnostic: SonarCloud quality gate FAILED — new_coverage 79.5% < 80.0%
  skillIssue: ai-pr watch loop detected failure but had no built-in strategy for coverage fixes. Manual investigation and test writing was needed.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: CLAUDE.md hook modifications cause mirror desync on push
  trigger: Pre-push or commit hooks add content to CLAUDE.md (e.g., FIRST ACTION section), but mirrors (GEMINI.md, copilot-instructions.md) are not updated
  action: After any commit where hooks modify CLAUDE.md, run `python scripts/sync_command_mirrors.py` and commit the mirror changes before pushing.
  relatedSkill: ai-commit
  diagnostic: 'test_sync_mirrors failed: CLAUDE.md content differs from GEMINI.md and copilot-instructions.md'
  skillIssue: The commit pipeline (steps 0-6) does not re-sync mirrors after hook modifications. Hooks run between commit and push, creating a window where CLAUDE.md diverges from mirrors.
  confidence: 0.5
  evidenceCount: 2
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: Spec claims must be validated against code before implementation
  trigger: Spec references file paths, line numbers, or agent behaviors without verification
  action: After drafting a spec, dispatch an ai-explore agent to verify each decision's claims against the actual codebase. Catch wrong file targets (e.g., D-099-04 pointed at phase-deliver.md but the real
    target was ai-pr/SKILL.md) before implementation begins.
  relatedSkill: ai-brainstorm
  diagnostic: D-099-04 INACCURATE — 5-agent doc pattern is in ai-pr/SKILL.md, not phase-deliver.md
  skillIssue: Spec was drafted from audit findings without re-verifying file locations. The audit correctly identified the pattern but the spec assigned it to the wrong file.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Subagent rate limits during mass parallel dispatch
  trigger: Dispatching 6+ agents in parallel hits provider rate limits, some agents return empty
  action: When agents fail with rate limits, re-dispatch only the failed tasks. Verify completed work before re-running — agents may have partially completed before hitting the limit.
  relatedSkill: ai-dispatch
  diagnostic: You've hit your limit · resets 12am
  skillIssue: ai-dispatch does not handle rate-limited subagent failures. No retry logic for provider-side rate limits.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Full pytest suite times out on large projects — filter by relevance
  trigger: pytest times out after 120s on projects with 400+ tests
  action: Use -k flag to filter tests by relevance (e.g., -k 'skill or mirror or sync'). Run full suite only in CI or with extended timeout.
  relatedSkill: ai-verify
  diagnostic: 'TimeoutExpired: Command timed out after 120 seconds'
  skillIssue: ai-verify runs full pytest without considering test count or timeout constraints.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Rich helpers (kv, status_line, error) output to stderr — tests must check .err
  trigger: Migrating CLI commands from typer.echo() to Rich helpers (kv, status_line, header, error)
  action: When changing from typer.echo() to Rich helpers, grep tests for capsys.readouterr().out and update to .err. Also check for case-sensitive string assertions that may break with Rich formatting.
  relatedSkill: ai-code
  diagnostic: '4 test files broke: assertions checked stdout but Rich writes to stderr'
  skillIssue: No automatic awareness that Rich console is stderr-based. Migration breaks test contracts silently.
  confidence: 0.5
  evidenceCount: 2
  domain: stack
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Org vs user project owner mismatch silently returns wrong board data
  trigger: gh project item-list returns unexpectedly few items or wrong project
  action: Verify owner by checking the URL the user provided (orgs/<org>/projects/N vs users/<user>/projects/N). Cross-check with gh repo view --json owner.
  relatedSkill: ai-start
  diagnostic: porque aparecen estos números? — user sees 26 items on org board but dashboard shows 1
  skillIssue: No validation that the queried project matches the expected one. Silent success with wrong data.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: Cross-document taxonomy must align to single source of truth
  trigger: Multiple documents describe the same skill/agent/feature taxonomy with different groupings
  action: When generating multiple documents that reference the same taxonomy (e.g., skill groups), always align to the canonical source (CLAUDE.md for presentation grouping). Run cross-document review
    after parallel generation.
  relatedSkill: ai-dispatch
  diagnostic: Guard + review found README.md and GETTING_STARTED.md had schema in different groups, market in different groups, video-editing in different groups
  skillIssue: Parallel build agents generated documents independently without cross-referencing each others grouping decisions.
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
workflows:
- pattern: Brainstorm → Plan → Dispatch with parallel explore agents
  trigger: Feature design requiring codebase research before spec
  action: Launch 3+ explore agents in parallel for different aspects, synthesize findings, then interrogate user with specific options
  relatedSkill: ai-brainstorm
  confidence: 0.85
  evidenceCount: 7
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Mass skill maintenance via parallel diagnostic agents + consolidated spec
  trigger: User requests batch analysis or improvement of all skills
  action: Distribute skills across 6 agents by category (workflow, delivery, enterprise, teaching, sdlc, meta). Each agent runs skill-sharpen --diagnose. Consolidate findings into cross-cutting patterns.
    Single-sweep spec with pattern-grouped commits.
  relatedSkill: ai-brainstorm
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'
- pattern: Config gap → explore all surfaces → cross-cutting standardization
  trigger: A missing manifest field causes incorrect behavior across multiple skills
  action: Use ai-explore to audit ALL consumers (schema, Python model, skills, scripts, templates, mirrors) before fixing. Apply fix to canonical source first, then sync mirrors.
  relatedSkill: ai-start
  confidence: 0.3
  evidenceCount: 1
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: 'PR watch-and-fix loop: poll → diagnose → fix → re-push → merge'
  trigger: CI check fails after PR creation (SonarCloud, integration tests, mirror desync)
  action: 'Poll every 15s. On failure: read logs, diagnose root cause, fix locally (tests, sync, format), commit+push, re-enter poll loop. Don''t declare done until state=MERGED.'
  relatedSkill: ai-pr
  confidence: 0.5
  evidenceCount: 2
  domain: project
  lastSeen: '2026-03-31T00:00:00Z'
- pattern: /ai-design for text-based information architecture, not just web UI
  trigger: User asks to make CLI/terminal output prettier or reorganize dashboard information
  action: Apply design thinking framework (purpose, tone, constraints, differentiation) to text/Markdown output. Use iterative refinement via multiple /ai-design invocations.
  relatedSkill: ai-design
  confidence: 0.5
  evidenceCount: 2
  domain: project
  lastSeen: '2026-04-01T00:00:00Z'

    ai-eval: { type: workflow, tags: [evaluation, gate, regression, pass-at-k] }

# Agents (orchestrators) — spec-127 sub-005: 10 → 9 orchestrators after
# `run-orchestrator` deletion (functionality absorbed into `autopilot --backlog`).
# `total` here counts orchestrator (ai-*) agents only; specialists (reviewer-*,
# verifier-*, verify-*) are tracked separately by the sync script.
# Total .claude/agents/*.md disk count: 24 (spec target 23 — see CHANGELOG M4).
agents:
  total: 9
  names:
    [
      plan,
      build,
      verify,
      guard,
      review,
      explore,
      guide,
      simplify,
      autopilot,
    ]

# Ownership
ownership:
  framework:
    [
      ".claude/skills/**",
      ".claude/agents/**",
      ".ai-engineering/**",
      ".github/agents/**",
      ".github/skills/**",
      ".github/hooks/**",
      ".github/copilot-instructions.md",
      ".codex/**",
      ".gemini/**",
    ]
  root_entry_points:
    CLAUDE.md:
      owner: framework
      canonical_source: CLAUDE.md
      runtime_role: ide-overlay
      sync:
        mode: copy
        template_path: src/ai_engineering/templates/project/CLAUDE.md
        mirror_paths: []
    AGENTS.md:
      owner: framework
      canonical_source: scripts/sync_command_mirrors.py:generate_agents_md
      runtime_role: shared-runtime-contract
      sync:
        mode: generate
        template_path: src/ai_engineering/templates/project/AGENTS.md
        mirror_paths: []
    GEMINI.md:
      owner: framework
      canonical_source: src/ai_engineering/templates/project/GEMINI.md
      runtime_role: ide-overlay
      sync:
        mode: render
        template_path: src/ai_engineering/templates/project/GEMINI.md
        mirror_paths: [.gemini/GEMINI.md]
    ".github/copilot-instructions.md":
      owner: framework
      canonical_source: CLAUDE.md
      runtime_role: ide-overlay
      sync:
        mode: generate
        template_path: src/ai_engineering/templates/project/copilot-instructions.md
        mirror_paths: []
  team: [".ai-engineering/contexts/team/**"]
  system: [".ai-engineering/state/**"]

# Telemetry
telemetry:
  consent: strict-opt-in
  default: disabled

# Hot-path SLO budgets (spec-114 D-114-02). Drive `ai-eng doctor --check hot-path`
# reporting and emit `hot_path_violation` events with `bug_tag: infra:slow-hook`
# when the rolling p95 exceeds the budget. Defaults match spec-112 D-112-08
# and CLAUDE.md hot-path discipline (≤1 s pre-commit, ≤5 s pre-push).
hot_path_slos:
  pre_commit_p95_ms: 1000
  pre_push_p95_ms: 5000
  skill_invocation_overhead_p95_ms: 200
  rolling_window_events: 100

# === SPEC-101 INSTALL CONFIGURATION ===
# User-edited install configuration for `ai-eng install` / `ai-eng doctor --fix`.
# Placed at end-of-file so the spec-101 required_tools governance lint can
# parse the block correctly (the lint's indent normaliser scans every line
# after `required_tools:` — siblings at column 0 confuse it). Keep
# `required_tools:` as the LAST top-level key in this file.

# Python environment mode (spec-101 D-101-12). `uv-tool` (default) installs
# Python tools to `~/.local/share/uv/tools/` so worktree creation never
# triggers a `.venv/` re-install. Alternatives: `venv` (legacy, per-cwd
# `.venv/`) and `shared-parent` (worktree-aware, requires a git repo).
python_env:
  mode: uv-tool

# Prereqs — hard prerequisites the user must install before `ai-eng install`
# (spec-101 D-101-14). `uv` covers the framework's own Python tool install
# path; `sdk_per_stack` covers the 9 stacks whose toolchains the framework
# never auto-installs (NG-11). Missing prereqs surface as EXIT 81.
prereqs:
  uv:
    version_range: ">=0.4.0,<1.0"
  sdk_per_stack:
    java:
      { name: JDK, min_version: "21", install_link: "https://adoptium.net/" }
    kotlin:
      { name: JDK, min_version: "21", install_link: "https://adoptium.net/" }
    swift:
      { name: Swift toolchain, install_link: "https://www.swift.org/install/" }
    dart: { name: Dart SDK, install_link: "https://dart.dev/get-dart" }
    csharp:
      {
        name: ".NET SDK",
        min_version: "9",
        install_link: "https://dotnet.microsoft.com/download",
      }
    go: { name: Go toolchain, install_link: "https://go.dev/dl/" }
    rust: { name: Rust toolchain, install_link: "https://rustup.rs/" }
    php:
      {
        name: PHP,
        min_version: "8.2",
        install_link: "https://www.php.net/downloads",
      }
    cpp: { name: clang/LLVM, install_link: "https://llvm.org/builds/" }

# Required tools — single source of truth for `ai-eng install` / `ai-eng doctor --fix`
# (spec-101 D-101-01). Covers a universal `baseline` plus per-stack tools for the
# 14 declared stacks. `platform_unsupported` (tool-level, max 2 of 3 OSes) and
# `platform_unsupported_stack` (stack-level, may list all 3) are governed by
# D-101-03 + D-101-13 — both require `unsupported_reason`. MUST be the last
# top-level key in this file (see lint-normaliser note above).
required_tools:
  baseline:
    - { name: gitleaks }
    - {
        name: semgrep,
        platform_unsupported: [windows],
        unsupported_reason: "semgrep has no Windows release",
      }
    - { name: jq }
    - { name: opa, version_range: ">=0.70.0,<2.0.0" }
  python:
    - { name: ruff }
    - { name: ty }
    - { name: pip-audit }
    - { name: pytest, scope: user_global }
  typescript:
    - { name: prettier, scope: project_local }
    - { name: eslint, scope: project_local }
    - { name: tsc, scope: project_local }
    - { name: vitest, scope: project_local }
  javascript:
    - { name: prettier, scope: project_local }
    - { name: eslint, scope: project_local }
    - { name: vitest, scope: project_local }
  java:
    - { name: checkstyle }
    - { name: google-java-format }
  csharp:
    - { name: dotnet-format }
  go:
    - { name: staticcheck }
    - { name: govulncheck }
  php:
    - { name: phpstan }
    - { name: php-cs-fixer }
    - { name: composer }
  rust:
    - { name: cargo-audit }
  kotlin:
    - { name: ktlint }
  swift:
    platform_unsupported_stack: [linux, windows]
    unsupported_reason: "swiftlint and swift-format have no Linux/Windows binaries"
    tools:
      - { name: swiftlint }
      - { name: swift-format }
  dart:
    - { name: dart-stack-marker }
  sql:
    - { name: sqlfluff }
  bash:
    - { name: shellcheck }
    - { name: shfmt }
  cpp:
    - { name: clang-tidy }
    - { name: clang-format }
    - { name: cppcheck }

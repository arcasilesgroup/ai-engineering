# ai-engineering manifest

# === USER CONFIGURATION ===
# Edit this section to match your project and organization.

schema_version: "2.0"
framework_version: "0.4.0"
name: ai-engineering
version: "1.0.0"

# Providers
providers:
  vcs: github
  ides: [terminal, vscode]
  stacks: [python]

# AI Providers
ai_providers:
  enabled: [claude-code, github-copilot, gemini-cli, codex]
  primary: claude-code

# Work items — board/issue tracker integration
# Configure your team's area path (Azure DevOps) or team label (GitHub Issues).
# Both provider configs are always present — switching is a one-line change.
work_items:
  provider: github # 'github' or 'azure_devops'
  azure_devops:
    area_path: "Project\\TeamName"
    # iteration_path: auto-detected from current sprint
  github:
    team_label: "team:core"
  state_mapping:
    refinement: "Backlog"
    ready: "Ready"
    in_progress: "In progress"
    in_review: "In review"
    done: "Done"
  process_template: "github_projects_v2"
  custom_fields:
    - id: "PVTSSF_lADOC-uI1c4BQt9Azg-wcuM"
      name: "Priority"
      type: "single_select"
      options: ["P0", "P1", "P2"]
    - id: "PVTSSF_lADOC-uI1c4BQt9Azg-wcuQ"
      name: "Size"
      type: "single_select"
      options: ["XS", "S", "M", "L", "XL"]
    - id: "PVTF_lADOC-uI1c4BQt9Azg-wcuU"
      name: "Estimate"
      type: "number"
    - id: "PVTF_lADOC-uI1c4BQt9Azg-wcuY"
      name: "Start date"
      type: "date"
    - id: "PVTF_lADOC-uI1c4BQt9Azg-wcuc"
      name: "Target date"
      type: "date"
  github_project:
    owner: arcasilesgroup
    number: 4
    status_field_id: "PVTSSF_lADOC-uI1c4BQt9Azg-wcrY"
    status_options:
      refinement: "f75ad846"
      ready: "61e4505c"
      in_progress: "47fc9ee4"
      in_review: "df73e18b"
      done: "98236657"
  hierarchy:
    feature: never_close # features are never closed by AI
    user_story: close_on_pr # closed when PR merges
    task: close_on_pr
    bug: close_on_pr

# Quality gates
quality:
  coverage: 80
  duplication: 3
  cyclomatic: 10
  cognitive: 15

# Gate execution mode (spec-105 D-105-02)
# - regulated (default): runs Tier 0 + Tier 1 + Tier 2 (full surface).
# - prototyping: skips Tier 2 governance checks for fast iteration on
#   feature branches; branch-aware + CI override + pre-push target checks
#   automatically escalate back to regulated when leaking is detected.
# pre_commit.auto_stage (spec-105 D-105-09):
# - true (default): orchestrator + Claude hook re-stage S_pre & M_post
#   after Wave 1 fixers; never touches files outside S_pre.
# - false: files modified by fixers stay unstaged; operator stages manually.
gates:
  mode: regulated
  pre_commit:
    auto_stage: true

# Documentation auto-update
# readme: true — recursively scans ALL README*.md files (root + subdirectories)
#   and updates each in context of its directory.
# changelog: true — keeps CHANGELOG.md current with each PR.
# solution_intent: true — syncs docs/solution-intent.md on architecture changes.
documentation:
  auto_update:
    readme: true
    changelog: true
    solution_intent: true
  external_portal:
    enabled: false
    source: null
    update_method: "pr"

# Session context — files loaded by /ai-start at session start
session:
  context_files:
    - .ai-engineering/LESSONS.md
    - CONSTITUTION.md
    - .ai-engineering/manifest.yml
    - .ai-engineering/state/decision-store.json

control_plane:
  constitutional_authority:
    primary: CONSTITUTION.md
    compatibility_aliases: []
  manifest_field_roles:
    canonical_input:
      - providers
      - ai_providers
      - artifact_feeds
      - work_items
      - quality
      - documentation
      - cicd
      - contexts.precedence
      - session.context_files
      - ownership.framework
      - ownership.root_entry_points
      - telemetry
      - gates
      - hot_path_slos
    generated_projection:
      - skills
      - agents
    descriptive_metadata:
      - schema_version
      - framework_version
      - name
      - version

# === FRAMEWORK MANAGED (do not edit below this line) ===
# These sections are maintained by ai-engineering automatically.


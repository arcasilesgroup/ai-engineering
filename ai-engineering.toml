# ai-engineering manifest — framework-level configuration
#
# This file configures the framework itself. For project-level configuration
# generated by `ai-eng bootstrap`, see `.ai-engineering/manifest.toml`.

schema_version = "1"

[framework]
version = "3.0.0-alpha.0"
license = "MIT"
homepage = "https://ai-engineering.dev"
spec_compatibility = ["anthropic-agent-skills/0.x", "github-spec-kit/1.x"]

[framework.principles]
# Hard non-negotiables (sourced from CONSTITUTION.md)
test_first        = true
single_source_of_truth = true
dual_plane_security    = true
subscription_piggyback = true   # no API keys from devs
deterministic_gates    = true   # never send LLM to do a linter's job

[ides]
# Day-1 supported IDEs (subscription piggyback targets)
tier_1 = ["claude-code", "github-copilot", "codex-cli"]
tier_2 = ["cursor", "gemini-cli"]
tier_3 = ["antigravity", "cline"]

[skills]
# Source of truth lives in skills/catalog/<name>/SKILL.md
source_dir   = "skills/catalog"
core_count   = 29
regulated_count = 4

[agents]
source_dir = "agents/catalog"
core_count = 7   # 6 core + security-scanner

[plugins]
# 3-tier federated marketplace
official_org   = "ai-engineering"
verified_org   = "ai-engineering-verified"
community_topic = "ai-engineering-plugin"
trust = { sigstore = true, slsa_min = 3, sbom = "cyclonedx-1.6", scorecard_min = 7.0 }

[telemetry]
# OTel from day 0 (not Phase 9)
otel_enabled        = true
otel_exporter       = "otlp"
ndjson_local_path   = ".ai-engineering/state/framework-events.ndjson"
opt_out_env_var     = "AI_ENGINEERING_TELEMETRY_DISABLED"

[security]
# Dual-Plane Architecture: deterministic gate before any execution
opa_policy_dir      = ".ai-engineering/policies"
audit_log_immutable = true
input_guard_enabled = true
identity_broker_enabled = true

[supply_chain]
# Shai-Hulud 2.0 mitigations
ignore_scripts_in_ci    = true
pin_actions_to_sha      = true
verify_plugin_signatures = "always"

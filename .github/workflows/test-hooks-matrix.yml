name: Test Hooks Matrix

# spec-114 G-4 + D-114-04: targeted cross-OS matrix that exercises only
# the hook surface (Codex/Gemini bridges, _lib, Copilot adapters).
# Full-suite cross-OS lives in ci-check.yml; this workflow gives us the
# 95% cross-platform signal at <10% of the runtime cost (D-114-04).
#
# Per D-114-03 hot-path SLO violations are advisory through 2026-05-31;
# we do NOT run `ai-eng doctor --check hot-path` as a blocking step here.
#
# Action SHAs are pinned to match ci-check.yml so dependabot can update
# both workflows in lockstep (spec-110 Article VI governance).

on:
  push:
    branches: [main, "rewrite/**", "run/**"]
    paths:
      - '.ai-engineering/scripts/hooks/**'
      - 'src/ai_engineering/templates/.ai-engineering/scripts/hooks/**'
      - 'tests/unit/_lib/**'
      - 'tests/unit/hooks/**'
      - 'tests/integration/test_codex_hooks.py'
      - 'tests/integration/test_gemini_hooks.py'
      - 'tests/integration/test_copilot_*'
      - '.github/workflows/test-hooks-matrix.yml'
  pull_request:
    branches: [main]
    paths:
      - '.ai-engineering/scripts/hooks/**'
      - 'src/ai_engineering/templates/.ai-engineering/scripts/hooks/**'
      - 'tests/unit/_lib/**'
      - 'tests/unit/hooks/**'
      - 'tests/integration/test_codex_hooks.py'
      - 'tests/integration/test_gemini_hooks.py'
      - 'tests/integration/test_copilot_*'
      - '.github/workflows/test-hooks-matrix.yml'

permissions:
  contents: read

concurrency:
  group: test-hooks-matrix-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-hooks:
    name: Hook Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Cache spec-104 gate-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: .ai-engineering/state/gate-cache/
          key: gate-cache-hooks-${{ runner.os }}-${{ hashFiles('pyproject.toml', '.ruff.toml') }}
          restore-keys: |
            gate-cache-hooks-${{ runner.os }}-
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run hook tests
        # D-114-04: scope intentionally narrow to the hook surface.
        # Full-suite cross-OS continues to live in ci-check.yml.
        run: |
          uv run pytest \
            tests/unit/_lib \
            tests/unit/hooks \
            tests/integration/test_codex_hooks.py \
            tests/integration/test_gemini_hooks.py \
            tests/integration/test_copilot_explorer_rename.py \
            -v --durations=10

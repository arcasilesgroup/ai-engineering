name: Weekly Health Report

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health:
    name: Weekly Health Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Framework health
        run: uv run ai-eng doctor --json
      - name: Content integrity
        run: uv run ai-eng validate --json || true
      - name: DORA metrics snapshot
        run: |
          echo "Health reporting: handled by this workflow (replaced weekly-report, feature-scanner, wiring-scanner runbooks)"

# SBOM Generation — CycloneDX (spec-110 Phase 2 T-2.7)
#
# Generates a CycloneDX SBOM (sbom.cdx.json) from the project's installed
# Python dependencies on every PR and every push to main, then uploads it
# as a per-commit workflow artifact (sbom-<sha>) so consumers can audit
# the dependency tree of any commit that lands on the default branch.
#
# Tooling:
#   - uv (astral-sh/setup-uv) — provides the project Python environment.
#   - cyclonedx-bom (PyPI) — provides the `cyclonedx-py` CLI. Installed
#     into the project venv via `uv pip install` so it can introspect
#     the same site-packages the project itself uses.
#   - cyclonedx-py environment — emits a CycloneDX 1.6 JSON SBOM for
#     the active Python environment (project + transitive deps).
#
# Artifact:
#   sbom-${{ github.sha }} contains sbom.cdx.json. Retention follows the
#   repository default (90 days). Mutation is governed by the same trust
#   boundary as the source commit.

name: SBOM

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: sbom-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-sbom:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - name: Install project dependencies
        run: uv sync --dev

      - name: Install cyclonedx-bom (provides cyclonedx-py CLI)
        run: uv pip install cyclonedx-bom

      - name: Generate CycloneDX SBOM
        run: uv run cyclonedx-py environment --output-file sbom.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json

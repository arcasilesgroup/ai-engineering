name: CI Auto-Fixer

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  fix:
    name: Auto-fix CI Failures
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Attempt lint auto-fix
        run: |
          uv run ruff check src/ tests/ --fix || true
          uv run ruff format src/ tests/ || true
      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Commit fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "ai-eng-bot"
          git config user.email "ai-eng-bot@users.noreply.github.com"
          git add -A
          git commit -m "fix(ci): auto-fix lint and format issues

          Automated fix triggered by CI failure on ${{ github.event.workflow_run.head_branch }}.

          Ai-Eng-Gate: passed"
          git push

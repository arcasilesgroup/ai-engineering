# Release Pipeline — Artifact-Driven (spec-097, D-097-04)
#
# Publishes a pre-built artifact to PyPI and finalizes the GitHub Release.
# Artifacts are produced by ci-build.yml (semantic-release creates tags and draft releases).
#
# Usage:
#   - Default (latest): Actions > Release > Run workflow > leave version empty
#   - Specific version: Actions > Release > Run workflow > version: 1.2.3
#   - Rollback: same as specific version, but with an older version number
#
# Constraints:
#   - Target version's tag (v*) must exist (created by ci-build semantic-release)
#   - ci-build must have run successfully for the tag's commit (artifact within 90-day retention)
#   - CHANGELOG.md must contain a ## [VERSION] section
#   - PyPI is immutable — cannot re-publish a version that was already published

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g., 1.2.3). Leave empty for latest tag."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: read
  id-token: write

concurrency:
  group: release-${{ github.event.inputs.version || 'latest' }}

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag-name: ${{ steps.resolve.outputs.tag_name }}
      ci-run-id: ${{ steps.resolve.outputs.ci_run_id }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Resolve version and locate artifact
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"

          # Resolve version: use input or find latest tag
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="${INPUT_VERSION#v}"
          else
            LATEST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST_TAG" ]; then
              echo "::error::No version tags found and no version input provided"
              exit 1
            fi
            VERSION="${LATEST_TAG#v}"
            echo "Using latest tag: $LATEST_TAG (version: $VERSION)"
          fi

          TAG_NAME="v${VERSION}"

          # Verify tag exists
          if ! git rev-parse --verify "refs/tags/${TAG_NAME}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG_NAME} does not exist. Ensure ci-build created it via semantic-release."
            exit 1
          fi

          TAG_SHA=$(git rev-parse "refs/tags/${TAG_NAME}^{commit}" 2>/dev/null || git rev-parse "refs/tags/${TAG_NAME}")

          # Find ci-build run for this tag's commit
          RUN_JSON=$(gh run list \
            --workflow=ci-build.yml \
            --commit="${TAG_SHA}" \
            --status=completed \
            --json databaseId,conclusion \
            --limit 1)

          if [ "$(echo "$RUN_JSON" | jq length)" -eq 0 ]; then
            echo "::error::No completed ci-build run found for commit ${TAG_SHA} (tag ${TAG_NAME})"
            exit 1
          fi

          CONCLUSION=$(echo "$RUN_JSON" | jq -r '.[0].conclusion')
          if [ "$CONCLUSION" != "success" ]; then
            echo "::error::ci-build run for ${TAG_NAME} concluded with '${CONCLUSION}', not 'success'"
            exit 1
          fi

          RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId')

          # Verify dist artifact exists in that run
          ARTIFACT_ID=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/artifacts" \
            --jq '.artifacts[] | select(.name=="dist") | .id')
          if [ -z "$ARTIFACT_ID" ]; then
            echo "::error::No 'dist' artifact found in ci-build run ${RUN_ID}. Artifact may have expired (90-day retention)."
            exit 1
          fi

          {
            echo "version=${VERSION}"
            echo "tag_name=${TAG_NAME}"
            echo "ci_run_id=${RUN_ID}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved: version=${VERSION}, tag=${TAG_NAME}, ci-run=${RUN_ID}"

  validate-changelog:
    name: Validate CHANGELOG
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: resolve-version
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.resolve-version.outputs.tag-name }}

      - name: Extract release notes
        env:
          VERSION: ${{ needs.resolve-version.outputs.version }}
        run: |
          # Try version-specific section first, fall back to [Unreleased]
          if grep -q "^## \[${VERSION}\]" CHANGELOG.md; then
            SECTION="${VERSION}"
          elif grep -q "^## \[Unreleased\]" CHANGELOG.md; then
            SECTION="Unreleased"
          else
            echo "No release notes found in CHANGELOG.md — using auto-generated notes"
            echo "See the full changelog in the repository." > release-notes.md
            exit 0
          fi
          awk "/^## \\[${SECTION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > release-notes.md
          echo "Release notes extracted from [${SECTION}]:"
          cat release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          retention-days: 1

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [resolve-version, validate-changelog]
    environment:
      name: pypi
      url: https://pypi.org/project/ai-engineering/
    steps:
      - name: Download dist from CI build
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
          run-id: ${{ needs.resolve-version.outputs.ci-run-id }}
          github-token: ${{ github.token }}

      - name: Verify artifact contents
        run: |
          echo "Downloaded artifacts:"
          ls -la dist/
          if [ -z "$(ls -A dist/)" ]; then
            echo "::error::dist/ is empty — CI artifact download failed"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0

  finalize-release:
    name: Finalize GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [resolve-version, validate-changelog, publish-pypi]
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: Promote draft release or create new
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag-name }}"

          # Check if draft release exists
          if gh release view "$TAG" --json isDraft --jq '.isDraft' 2>/dev/null | grep -q true; then
            echo "Promoting draft release ${TAG} to published"
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --draft=false \
              --notes-file release-notes.md \
              --latest
          else
            echo "No draft release found for ${TAG}, checking if published release exists"
            if gh release view "$TAG" 2>/dev/null; then
              echo "Release ${TAG} already exists and is published — updating notes only"
              gh release edit "$TAG" \
                --repo "${{ github.repository }}" \
                --notes-file release-notes.md \
                --latest
            else
              echo "Creating new published release for ${TAG}"
              gh release create "$TAG" \
                --repo "${{ github.repository }}" \
                --title "$TAG" \
                --notes-file release-notes.md \
                --latest
            fi
          fi

      - name: Verify release is published
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.resolve-version.outputs.tag-name }}"
          IS_DRAFT=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft --jq '.isDraft')
          if [ "$IS_DRAFT" = "true" ]; then
            echo "::error::Release ${TAG} is still a draft after finalization attempt"
            exit 1
          fi
          echo "Release ${TAG} is published successfully"

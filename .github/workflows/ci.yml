name: CI

on:
  push:
    branches: [main, "rewrite/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  docs-scope:
    name: Docs Scope
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            docs:
              - '**/*.md'
              - '**/*.mdx'
              - 'docs/**'
            non_docs:
              - '!**/*.md'
              - '!**/*.mdx'
              - '!docs/**'
            docs_only:
              - '**/*.md'
              - '**/*.mdx'
              - 'docs/**'
              - '!**/*.py'
              - '!.github/**'

  lint:
    name: Lint & Format
    needs: [docs-scope]
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    needs: [docs-scope]
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: ty check
        run: uv run ty check src/

  test:
    name: Test (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    needs: [docs-scope]
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run tests
        run: |
          uv run pytest tests/ -v --durations=25 --cov=src/ai_engineering --cov-report=term-missing | tee test-output.log
      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
      - name: Upload slow-tests artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: slow-tests-report
          path: test-output.log

  framework-smoke:
    name: Framework Smoke (${{ matrix.python-version }} / ${{ matrix.os }})
    needs: [docs-scope]
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --dev
      - name: Init smoke repository
        run: |
          rm -rf smoke-repo
          mkdir -p smoke-repo
          git init smoke-repo
          git -C smoke-repo config user.email "ci@test.com"
          git -C smoke-repo config user.name "CI"
      - name: Install framework
        run: uv run ai-eng install smoke-repo
      - name: Doctor diagnostics
        run: uv run ai-eng doctor smoke-repo --json
      - name: Commit-msg gate smoke
        run: |
          printf "smoke commit" > smoke-repo/.git/COMMIT_EDITMSG
          uv run ai-eng gate commit-msg smoke-repo/.git/COMMIT_EDITMSG --target smoke-repo
      - name: Hook verification smoke
        run: uv run python -c "from pathlib import Path; from ai_engineering.hooks.manager import verify_hooks; assert all(verify_hooks(Path('smoke-repo')).values())"

  workflow-sanity:
    name: Workflow Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/actionlint@v1
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Workflow policy checks
        run: uv run python scripts/check_workflow_policy.py

  verify-gate-trailers:
    name: Verify Gate Trailers
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure PR commits include gate trailer
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          missing=0
          while read -r sha; do
            [ -z "$sha" ] && continue
            msg="$(git log -1 --format=%B "$sha")"
            if ! printf "%s" "$msg" | grep -q "^Ai-Eng-Gate: passed$"; then
              echo "Missing trailer in commit: $sha"
              missing=1
            fi
          done < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          if [ "$missing" -ne 0 ]; then
            echo "At least one commit is missing 'Ai-Eng-Gate: passed'"
            exit 1
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: pip-audit
        run: uv run pip-audit
      - name: Install semgrep
        run: python -m pip install semgrep
      - name: semgrep
        run: semgrep --config .semgrep.yml --error .

  content-integrity:
    name: Content Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Validate content integrity
        run: uv run ai-eng validate

  build:
    name: Build Package
    needs: [docs-scope, lint, typecheck, test, framework-smoke, security, content-integrity, workflow-sanity]
    if: needs.docs-scope.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build
        run: uv build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

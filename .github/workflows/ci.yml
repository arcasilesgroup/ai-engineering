name: CI

on:
  push:
    branches: [main, "rewrite/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  change-scope:
    name: Change Scope
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      test-config: ${{ steps.filter.outputs.test-config }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - '**/*.py'
              - '**/*.toml'
            test-config:
              - 'pyproject.toml'
              - 'tests/conftest.py'
              - '.github/workflows/ci.yml'
              - 'scripts/**'
              - 'uv.lock'
              - '.semgrep.yml'
              - '.gitleaks.toml'

  lint:
    name: Lint & Format
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: ty check
        run: uv run ty check src/

  test-unit:
    name: Unit (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Install dependencies
        run: uv sync --dev
      - name: Compute unit scope
        id: scope
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="origin/main"
          fi

          uv run python -m ai_engineering.policy.test_scope --tier unit --base-ref "$BASE" --format json > scope-diagnostic.json
          ARGS="$(uv run python -m ai_engineering.policy.test_scope --tier unit --base-ref "$BASE" --format args)"

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ needs.change-scope.outputs.test-config }}" == "true" ]]; then
            ARGS="tests/unit"
          fi

          if [[ -z "${ARGS}" ]]; then
            ARGS="__SKIP__"
          fi

          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"
      - name: Run unit tests
        if: steps.scope.outputs.args != '__SKIP__'
        run: |
          uv run pytest ${{ steps.scope.outputs.args }} -v -n auto --dist worksteal --durations=25 | tee test-output.log
      - name: Run unit tests with coverage (ubuntu/3.12 only)
        if: steps.scope.outputs.args != '__SKIP__' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          uv run pytest tests/unit -v -n auto --dist worksteal \
            --cov=src/ai_engineering --cov-report=xml:coverage-unit.xml
      - name: Skip unit tests (docs-only)
        if: steps.scope.outputs.args == '__SKIP__'
        run: echo "No unit tests selected (docs-only changes)."
      - name: Upload unit scope diagnostic
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: test-scope-diagnostic-unit-${{ matrix.os }}-${{ matrix.python-version }}
          path: scope-diagnostic.json
      - name: Upload slow-tests artifact
        if: steps.scope.outputs.args != '__SKIP__' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: slow-tests-report
          path: test-output.log
      - name: Upload coverage report
        if: steps.scope.outputs.args != '__SKIP__' && matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit.xml

  test-integration:
    name: Integration (${{ matrix.os }})
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install dependencies
        run: uv sync --dev
      - name: Compute integration scope
        id: scope
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="origin/main"
          fi

          ARGS="$(uv run python -m ai_engineering.policy.test_scope --tier integration --base-ref "$BASE" --format args)"

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ needs.change-scope.outputs.test-config }}" == "true" ]]; then
            ARGS="tests/integration"
          fi

          if [[ -z "${ARGS}" ]]; then
            ARGS="__SKIP__"
          fi

          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"
      - name: Run integration tests
        if: steps.scope.outputs.args != '__SKIP__'
        run: |
          uv run pytest ${{ steps.scope.outputs.args }} -v -n auto --dist worksteal --durations=25 | tee integration-output.log
      - name: Run integration tests with coverage (ubuntu only)
        if: steps.scope.outputs.args != '__SKIP__' && matrix.os == 'ubuntu-latest'
        run: |
          uv run pytest tests/integration -v -n auto --dist worksteal \
            --cov=src/ai_engineering --cov-report=xml:coverage-integration.xml
      - name: Skip integration tests (docs-only)
        if: steps.scope.outputs.args == '__SKIP__'
        run: echo "No integration tests selected (docs-only changes)."
      - name: Upload coverage report
        if: steps.scope.outputs.args != '__SKIP__' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: coverage-integration.xml

  test-e2e:
    name: E2E
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install 3.12
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install dependencies
        run: uv sync --dev
      - name: Compute e2e scope
        id: scope
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="origin/main"
          fi

          ARGS="$(uv run python -m ai_engineering.policy.test_scope --tier e2e --base-ref "$BASE" --format args)"

          if [[ "${{ github.ref }}" == "refs/heads/main" || "${{ needs.change-scope.outputs.test-config }}" == "true" ]]; then
            ARGS="tests/e2e"
          fi

          if [[ -z "${ARGS}" ]]; then
            ARGS="__SKIP__"
          fi

          echo "args=${ARGS}" >> "$GITHUB_OUTPUT"
      - name: Run e2e tests
        if: steps.scope.outputs.args != '__SKIP__'
        run: |
          uv run pytest ${{ steps.scope.outputs.args }} -v --durations=10 | tee e2e-output.log
      - name: Run e2e tests with coverage
        if: steps.scope.outputs.args != '__SKIP__'
        run: |
          uv run pytest tests/e2e -v \
            --cov=src/ai_engineering --cov-report=xml:coverage-e2e.xml
      - name: Skip e2e tests (docs-only)
        if: steps.scope.outputs.args == '__SKIP__'
        run: echo "No e2e tests selected (docs-only changes)."
      - name: Upload coverage report
        if: steps.scope.outputs.args != '__SKIP__'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage-e2e.xml

  sonarcloud:
    name: SonarCloud
    needs: [change-scope, test-unit, test-integration, test-e2e]
    if: needs.change-scope.outputs.code == 'true' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download coverage reports
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Verify coverage reports
        run: |
          # List downloaded coverage XMLs (informational)
          find . -maxdepth 1 -name 'coverage-*.xml' -print | sort
          count=$(find . -maxdepth 1 -name 'coverage-*.xml' -print | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "Found $count coverage report(s)"
          else
            echo "No coverage reports found (tests may have been skipped)"
          fi
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage-unit.xml,coverage-integration.xml,coverage-e2e.xml

  framework-smoke:
    name: Framework Smoke (${{ matrix.os }})
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: windows-latest, python-version: "3.12" }
          - { os: macos-latest, python-version: "3.12" }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Install dependencies
        run: uv sync --dev
      - name: Init smoke repository
        run: |
          rm -rf smoke-repo
          mkdir -p smoke-repo
          git init smoke-repo
          git -C smoke-repo config user.email "ci@test.com"
          git -C smoke-repo config user.name "CI"
      - name: Install framework
        run: uv run ai-eng install smoke-repo
        env:
          PYTHONUTF8: "1"
      - name: Doctor diagnostics
        run: uv run ai-eng doctor smoke-repo --json
        env:
          PYTHONUTF8: "1"
      - name: Commit-msg gate smoke
        run: |
          printf "smoke commit" > smoke-repo/.git/COMMIT_EDITMSG
          uv run ai-eng gate commit-msg smoke-repo/.git/COMMIT_EDITMSG --target smoke-repo
        env:
          PYTHONUTF8: "1"
      - name: Hook verification smoke
        run: uv run python -c "from pathlib import Path; from ai_engineering.hooks.manager import verify_hooks; assert all(verify_hooks(Path('smoke-repo')).values())"

  workflow-sanity:
    name: Workflow Sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          pwd >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run actionlint
        run: ./actionlint
      - name: Workflow policy checks
        run: uv run python scripts/check_workflow_policy.py
      - name: Test mapping integrity
        run: uv run python scripts/check_test_mapping.py

  verify-gate-trailers:
    name: Verify Gate Trailers
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Ensure PR commits include gate trailer
        shell: bash
        run: |
          set -euo pipefail
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          msg="$(git log -1 --format=%B "$HEAD_SHA")"
          if ! printf "%s" "$msg" | grep -q "^Ai-Eng-Gate: passed$"; then
            echo "Missing trailer in latest commit: $HEAD_SHA"
            exit 1
          fi

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.0"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
      - name: gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
      - name: pip-audit
        run: uv run pip-audit
      - name: Install semgrep
        run: python -m pip install semgrep
      - name: semgrep
        run: semgrep --config .semgrep.yml --error .

  content-integrity:
    name: Content Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Validate content integrity
        run: uv run ai-eng validate

  build:
    name: Build Package
    needs:
      [
        change-scope,
        lint,
        typecheck,
        test-unit,
        test-integration,
        test-e2e,
        sonarcloud,
        framework-smoke,
        security,
        content-integrity,
        workflow-sanity,
      ]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Build
        run: uv build
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

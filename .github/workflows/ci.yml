name: CI

on:
  push:
    branches: [main, "rewrite/**"]
    paths-ignore:
      - '**.mdx'
      - '**.rst'
      - '**.txt'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.mdx'
      - '**.rst'
      - '**.txt'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  change-scope:
    name: Change Scope
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.filter.outputs.code }}
      test-config: ${{ steps.filter.outputs.test-config }}
      has-snyk-token: ${{ steps.tokens.outputs.has-snyk-token }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Check optional tokens
        id: tokens
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "has-snyk-token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-snyk-token=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'scripts/**'
              - '**/*.py'
              - '**/*.toml'
              - 'uv.lock'
              - '.github/workflows/**'
              - '**/*.yml'
            test-config:
              - 'pyproject.toml'
              - 'tests/conftest.py'
              - '.github/workflows/ci.yml'
              - 'scripts/**'
              - 'uv.lock'
              - '.semgrep.yml'
              - '.gitleaks.toml'

  lint:
    name: Lint & Format
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/

  duplication:
    name: Duplication Check
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Check code duplication
        run: uv run python -m ai_engineering.policy.duplication --path src/ai_engineering --threshold 3

  risk-acceptance:
    name: Risk Acceptance Check
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Check risk acceptances
        run: uv run ai-eng gate risk-check --strict

  typecheck:
    name: Type Check
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: ty check
        run: uv run ty check src/

  test-unit:
    name: Unit (Python ${{ matrix.python-version }} / ${{ matrix.os }})
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Install dependencies
        run: uv sync --dev
      - name: Run unit tests
        run: |
          uv run pytest tests/unit -v -n auto --dist worksteal --durations=25 | tee test-output.log
      - name: Run unit tests with coverage (ubuntu/3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          uv run pytest tests/unit -v -n auto --dist worksteal \
            --cov=src/ai_engineering --cov-report=xml:coverage-unit.xml
      - name: Upload slow-tests artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: slow-tests-report
          path: test-output.log
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-unit
          path: coverage-unit.xml

  test-integration:
    name: Integration (${{ matrix.os }})
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run integration tests
        run: |
          uv run pytest tests/integration -v -n auto --dist worksteal --durations=25 | tee integration-output.log
      - name: Run integration tests with coverage (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          uv run pytest tests/integration -v -n auto --dist worksteal \
            --cov=src/ai_engineering --cov-report=xml:coverage-integration.xml
      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration
          path: coverage-integration.xml

  test-e2e:
    name: E2E
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Set Python version
        run: uv python install 3.12
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run e2e tests
        run: |
          uv run pytest tests/e2e -v --durations=10 | tee e2e-output.log
      - name: Run e2e tests with coverage
        run: |
          uv run pytest tests/e2e -v \
            --cov=src/ai_engineering --cov-report=xml:coverage-e2e.xml
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-e2e
          path: coverage-e2e.xml

  sonarcloud:
    name: SonarCloud
    needs: [change-scope, test-unit, test-integration, test-e2e]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Download coverage reports
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-*
          merge-multiple: true
      - name: Verify coverage reports
        run: |
          # List downloaded coverage XMLs (informational)
          find . -maxdepth 1 -name 'coverage-*.xml' -print | sort
          count=$(find . -maxdepth 1 -name 'coverage-*.xml' -print | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "Found $count coverage report(s)"
          else
            echo "ERROR: No coverage reports found — tests may have been skipped but coverage is required"
            exit 1
          fi
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage-unit.xml,coverage-integration.xml,coverage-e2e.xml

  framework-smoke:
    name: Framework Smoke (${{ matrix.os }})
    needs: [change-scope]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, python-version: "3.12" }
          - { os: windows-latest, python-version: "3.12" }
          - { os: macos-latest, python-version: "3.12" }
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Set Python version
        run: |
          for attempt in 1 2 3; do
            if uv python install ${{ matrix.python-version }}; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "uv python install failed (attempt $attempt/3). Retrying in 15s..."
              sleep 15
            fi
          done
          echo "uv python install failed after 3 attempts"
          exit 1
      - name: Install dependencies
        run: uv sync --dev
      - name: Init smoke repository
        run: |
          rm -rf smoke-repo
          mkdir -p smoke-repo
          git init -b main smoke-repo
          git -C smoke-repo config user.email "ci@test.com"
          git -C smoke-repo config user.name "CI"
      - name: Install framework
        run: uv run ai-eng install smoke-repo
        env:
          PYTHONUTF8: "1"
      - name: Doctor diagnostics
        run: |
          set +e
          uv run ai-eng doctor smoke-repo --json
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "ERROR: Doctor reported failures"
            exit 1
          fi
          # Exit 0 (all ok) or 2 (warnings only) are acceptable in smoke
        env:
          PYTHONUTF8: "1"
      - name: Commit-msg gate smoke
        run: |
          printf "smoke commit" > smoke-repo/.git/COMMIT_EDITMSG
          uv run ai-eng gate commit-msg smoke-repo/.git/COMMIT_EDITMSG --target smoke-repo
        env:
          PYTHONUTF8: "1"
      - name: Hook verification smoke
        run: uv run python -c "from pathlib import Path; from ai_engineering.hooks.manager import verify_hooks; assert all(verify_hooks(Path('smoke-repo')).values())"

  workflow-sanity:
    name: Workflow Sanity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          pwd >> "$GITHUB_PATH"
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run actionlint
        run: find .github/workflows -name '*.yml' -exec ./actionlint {} +
      - name: Workflow policy checks
        run: uv run python scripts/check_workflow_policy.py
      - name: Mirror sync integrity
        run: uv run ai-eng sync --check

  verify-gate-trailers:
    name: Verify Gate Trailers
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Ensure PR commits include gate trailer
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          FAILED=0
          for sha in $(git log --no-merges --format=%H "$BASE".."$HEAD"); do
            msg="$(git log -1 --format=%B "$sha")"
            if ! printf "%s" "$msg" | grep -q "^Ai-Eng-Gate: passed$"; then
              echo "Missing trailer in commit: $sha"
              echo "  Message: $(git log -1 --format=%s "$sha")"
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more commits are missing the Ai-Eng-Gate trailer."
            exit 1
          fi
          echo "All $(git log --no-merges --format=%H "$BASE".."$HEAD" | wc -l | tr -d ' ') commits verified."

  snyk-security:
    name: Snyk Security
    needs: [change-scope]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: needs.change-scope.outputs.has-snyk-token == 'true'
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Install Snyk CLI
        run: npm install -g snyk
      - name: Export pinned requirements for Snyk
        run: |
          uv pip freeze > requirements.txt
          echo "Exported $(wc -l < requirements.txt) pinned packages"
      - name: Snyk dependency test
        run: |
          . .venv/bin/activate
          snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Snyk code test (SAST)
        run: snyk code test --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      - name: Snyk monitor (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          . .venv/bin/activate
          snyk monitor --file=requirements.txt --package-manager=pip
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.0"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks
      - name: gitleaks
        run: gitleaks detect --source . --config .gitleaks.toml --no-banner --redact
      - name: pip-audit
        # CVE-2026-4539: ReDoS in pygments AdlLexer (CVSS 3.3, local-only, no patch yet).
        # Risk accepted in DEC-025. Remove when pygments >= 2.19.3 is released.
        run: uv run pip-audit --ignore-vuln CVE-2026-4539
      - name: Install semgrep
        run: python -m pip install semgrep
      - name: semgrep
        run: semgrep --config .semgrep.yml --error --json . > semgrep-results.json
      - name: Check semgrep skip ratio
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('semgrep-results.json'))
          scanned = len(data.get('paths', {}).get('scanned', []))
          skipped = len(data.get('paths', {}).get('skipped', []))
          total = scanned + skipped
          if total == 0:
              print('No files processed by semgrep')
              sys.exit(1)
          ratio = skipped / total * 100
          print(f'Semgrep: {scanned} scanned, {skipped} skipped ({ratio:.1f}%)')
          if ratio > 50:
              print(f'ERROR: Skip ratio {ratio:.1f}% exceeds 50% threshold')
              sys.exit(1)
          print('Skip ratio within threshold')
          "

  content-integrity:
    name: Content Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Validate content integrity
        run: uv run ai-eng validate
      - name: Governance consistency
        run: uv run ai-eng validate --json
      - name: Manifest validation
        run: |
          # Verify manifest.yml exists and has expected structure
          python -c "
          import yaml
          from pathlib import Path
          m = yaml.safe_load(Path('.ai-engineering/manifest.yml').read_text())
          gs = m.get('governance_surface', m)
          assert 'skills' in gs or 'agents' in gs, 'manifest missing governance_surface.skills/agents'
          print(f'Manifest OK')
          "
      - name: Skill schema validation
        run: |
          # Verify all skills have valid SKILL.md with frontmatter
          python -c "
          from pathlib import Path
          skills_dir = Path('src/ai_engineering/templates/project/.claude/skills')
          errors = []
          for skill_dir in sorted(skills_dir.iterdir()):
              if not skill_dir.is_dir():
                  continue
              skill_file = skill_dir / 'SKILL.md'
              if not skill_file.exists():
                  errors.append(f'{skill_dir.name}: missing SKILL.md')
                  continue
              text = skill_file.read_text()
              if not text.startswith('---'):
                  errors.append(f'{skill_dir.name}: missing frontmatter')
              if 'name:' not in text[:500]:
                  errors.append(f'{skill_dir.name}: missing name in frontmatter')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              raise SystemExit(1)
          print(f'All {len(list(skills_dir.iterdir()))} skills valid')
          "

  build:
    name: Build Package
    needs:
      [
        change-scope,
        lint,
        duplication,
        risk-acceptance,
        typecheck,
        test-unit,
        test-integration,
        test-e2e,
        sonarcloud,
        framework-smoke,
        security,
        content-integrity,
        workflow-sanity,
      ]
    if: needs.change-scope.outputs.code == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true
      - name: Build
        run: uv build
      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 5

  ci-result:
    name: CI Result
    if: always()
    timeout-minutes: 5
    needs:
      [
        change-scope,
        lint,
        duplication,
        risk-acceptance,
        typecheck,
        test-unit,
        test-integration,
        test-e2e,
        sonarcloud,
        framework-smoke,
        workflow-sanity,
        verify-gate-trailers,
        snyk-security,
        security,
        content-integrity,
        build,
      ]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI results
        run: |
          set -euo pipefail

          CODE="${{ needs.change-scope.outputs.code }}"
          IS_PR="${{ github.event_name == 'pull_request' }}"
          IS_DEPENDABOT="${{ github.actor == 'dependabot[bot]' }}"

          # ── always-required: MUST succeed ──
          always_required=(
            "workflow-sanity:${{ needs.workflow-sanity.result }}"
            "security:${{ needs.security.result }}"
            "content-integrity:${{ needs.content-integrity.result }}"
          )

          # ── code-conditional: MUST succeed when code changed, skip accepted otherwise ──
          code_conditional=(
            "lint:${{ needs.lint.result }}"
            "duplication:${{ needs.duplication.result }}"
            "risk-acceptance:${{ needs.risk-acceptance.result }}"
            "typecheck:${{ needs.typecheck.result }}"
            "test-unit:${{ needs.test-unit.result }}"
            "test-integration:${{ needs.test-integration.result }}"
            "test-e2e:${{ needs.test-e2e.result }}"
            "sonarcloud:${{ needs.sonarcloud.result }}"
            "framework-smoke:${{ needs.framework-smoke.result }}"
            "build:${{ needs.build.result }}"
          )

          # ── pr-only: MUST succeed on non-dependabot PRs, skip accepted otherwise ──
          pr_only=(
            "verify-gate-trailers:${{ needs.verify-gate-trailers.result }}"
          )

          # ── optional: may skip but MUST NOT fail ──
          optional=(
            "snyk-security:${{ needs.snyk-security.result }}"
          )

          FAILED=0

          echo "=== CI Result Gate ==="
          echo "code=$CODE is_pr=$IS_PR is_dependabot=$IS_DEPENDABOT"
          echo ""

          # ── change-scope must succeed (upstream data provider) ──
          CHANGE_SCOPE="${{ needs.change-scope.result }}"
          echo "change-scope: $CHANGE_SCOPE"
          if [[ "$CHANGE_SCOPE" != "success" ]]; then
            echo "  ✗ FAIL: change-scope must succeed but got $CHANGE_SCOPE"
            FAILED=1
          fi
          echo ""

          echo "── Always Required ──"
          for entry in "${always_required[@]}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            echo "  $name: $result"
            if [[ "$result" != "success" ]]; then
              echo "  ✗ FAIL: $name is required but got $result"
              FAILED=1
            fi
          done

          echo ""
          echo "── Code-Conditional ──"
          for entry in "${code_conditional[@]}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            echo "  $name: $result (code=$CODE)"
            if [[ "$CODE" == "true" ]]; then
              if [[ "$result" != "success" ]]; then
                echo "  ✗ FAIL: $name is required (code changed) but got $result"
                FAILED=1
              fi
            else
              if [[ "$result" == "failure" ]]; then
                echo "  ✗ FAIL: $name failed unexpectedly"
                FAILED=1
              fi
            fi
          done

          echo ""
          echo "── PR-Only ──"
          for entry in "${pr_only[@]}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            echo "  $name: $result (is_pr=$IS_PR, is_dependabot=$IS_DEPENDABOT)"
            if [[ "$IS_PR" == "true" && "$IS_DEPENDABOT" == "false" ]]; then
              if [[ "$result" != "success" ]]; then
                echo "  ✗ FAIL: $name is required for non-dependabot PRs but got $result"
                FAILED=1
              fi
            else
              if [[ "$result" == "failure" ]]; then
                echo "  ✗ FAIL: $name failed unexpectedly"
                FAILED=1
              fi
            fi
          done

          echo ""
          echo "── Optional ──"
          for entry in "${optional[@]}"; do
            name="${entry%%:*}"
            result="${entry##*:}"
            echo "  $name: $result"
            if [[ "$result" == "failure" ]]; then
              echo "  ✗ FAIL: $name is optional but must not fail (got failure)"
              FAILED=1
            fi
          done

          echo ""
          if [[ "$FAILED" -eq 1 ]]; then
            echo "✗ CI Result: FAILED"
            exit 1
          fi
          echo "✓ CI Result: PASSED"

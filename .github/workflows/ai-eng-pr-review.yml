name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Automated PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Detect languages in diff
        id: detect
        run: |
          LANGS=$(git diff --name-only origin/main...HEAD | sed 's/.*\.//' | sort -u | tr '\n' ',')
          echo "languages=$LANGS" >> "$GITHUB_OUTPUT"
      - name: Run security scan
        run: uv run ai-eng verify security --json > security-report.json || true
      - name: Run quality scan
        run: uv run ai-eng verify quality --json > quality-report.json || true
      - name: Upload review artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pr-review-reports
          path: |
            security-report.json
            quality-report.json

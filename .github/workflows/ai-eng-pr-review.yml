name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    name: Automated PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Detect languages in diff
        id: detect
        run: |
          LANGS=$(git diff --name-only origin/main...HEAD | sed 's/.*\.//' | sort -u | tr '\n' ',')
          echo "languages=$LANGS" >> "$GITHUB_OUTPUT"
      - name: Run security scan
        run: uv run ai-eng verify security --json > security-report.json || true
      - name: Run quality scan
        run: uv run ai-eng verify quality --json > quality-report.json || true
      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pr-review-reports
          path: |
            security-report.json
            quality-report.json

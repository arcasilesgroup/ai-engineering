name: CI Build

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build Package
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Determine version bump
        id: semrel
        run: |
          uv run semantic-release version --no-commit --no-push --no-vcs-release --print-tag 2>/dev/null > /tmp/new-tag.txt || true
          NEW_TAG=$(head -1 /tmp/new-tag.txt)
          if [ -n "$NEW_TAG" ] && [ "$NEW_TAG" != "$(git describe --tags --abbrev=0 2>/dev/null)" ]; then
            VERSION="${NEW_TAG#v}"
            {
              echo "released=true"
              echo "tag=$NEW_TAG"
              echo "version=$VERSION"
            } >> "$GITHUB_OUTPUT"
            echo "Version bump detected: $NEW_TAG (version: $VERSION)"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No version bump needed"
          fi

      - name: Bump version locally for build
        if: steps.semrel.outputs.released == 'true'
        env:
          RELEASE_VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${RELEASE_VERSION}\"/" pyproject.toml
          echo "Bumped pyproject.toml to ${RELEASE_VERSION} (local only, not committed)"

      - name: Build
        run: uv build

      - name: Create tag via API
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          SHA=$(git rev-parse HEAD)
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$SHA"

      - name: Attest build provenance
        if: steps.semrel.outputs.released == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: dist/*

      - name: Generate CycloneDX SBOM
        if: steps.semrel.outputs.released == 'true'
        run: |
          pip install cyclonedx-bom
          uv export --no-dev --frozen > requirements-prod.txt
          cyclonedx-py requirements requirements-prod.txt --output-format json -o sbom.json --spec-version 1.5

      - name: Generate SHA-256 checksums
        if: steps.semrel.outputs.released == 'true'
        run: sha256sum dist/* sbom.json > CHECKSUMS-SHA256.txt

      - name: Verify attestation
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          for f in dist/*; do
            gh attestation verify "$f" --repo "$REPO"
          done

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 90

      - name: Upload supply chain artifacts
        if: steps.semrel.outputs.released == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain
          path: |
            sbom.json
            CHECKSUMS-SHA256.txt
          retention-days: 90

      - name: Create draft GitHub Release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --generate-notes \
            dist/*

      - name: Attach supply chain assets to draft release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          gh release upload "$TAG" sbom.json CHECKSUMS-SHA256.txt --clobber

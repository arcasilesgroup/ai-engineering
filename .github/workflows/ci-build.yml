name: CI Build

on:
  workflow_run:
    workflows: ["CI Check"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build Package
    # Skip when the trigger commit is a version bump commit-back (prevents loops).
    # Native [skip ci] does not apply to workflow_run triggers.
    # workflow_dispatch bypasses the conclusion check for manual recovery.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       !contains(github.event.workflow_run.head_commit.message, '[skip ci]'))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Determine version bump
        id: semrel
        run: |
          uv run semantic-release version --no-commit --no-push --no-vcs-release --print-tag 2>/dev/null > /tmp/new-tag.txt || true
          NEW_TAG=$(head -1 /tmp/new-tag.txt)
          if [ -n "$NEW_TAG" ] && [ "$NEW_TAG" != "$(git describe --tags --abbrev=0 2>/dev/null)" ]; then
            VERSION="${NEW_TAG#v}"
            {
              echo "released=true"
              echo "tag=$NEW_TAG"
              echo "version=$VERSION"
            } >> "$GITHUB_OUTPUT"
            echo "Version bump detected: $NEW_TAG (version: $VERSION)"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "No version bump needed"
          fi

      - name: Bump version locally for build
        if: steps.semrel.outputs.released == 'true'
        env:
          RELEASE_VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${RELEASE_VERSION}\"/" pyproject.toml
          echo "Bumped pyproject.toml to ${RELEASE_VERSION} (local only, not committed)"

      - name: Build
        run: uv build

      - name: Create tag via API
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          SHA=$(git rev-parse HEAD)
          gh api "repos/${REPO}/git/refs" \
            -f ref="refs/tags/${TAG}" \
            -f sha="$SHA"

      - name: Attest build provenance
        if: steps.semrel.outputs.released == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Generate CycloneDX SBOM
        if: steps.semrel.outputs.released == 'true'
        run: |
          pip install cyclonedx-bom
          uv export --no-dev --frozen > requirements-prod.txt
          cyclonedx-py requirements requirements-prod.txt --output-format json -o sbom.json --spec-version 1.5

      - name: Generate SHA-256 checksums
        if: steps.semrel.outputs.released == 'true'
        run: sha256sum dist/* sbom.json > CHECKSUMS-SHA256.txt

      - name: Verify attestation
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          for f in dist/*; do
            gh attestation verify "$f" --repo "$REPO"
          done

      - name: Upload dist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/
          retention-days: 90

      - name: Upload supply chain artifacts
        if: steps.semrel.outputs.released == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: supply-chain
          path: |
            sbom.json
            CHECKSUMS-SHA256.txt
          retention-days: 90

      - name: Create draft GitHub Release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --draft \
            --generate-notes \
            dist/*

      - name: Attach supply chain assets to draft release
        if: steps.semrel.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.semrel.outputs.tag }}
        run: |
          gh release upload "$TAG" sbom.json CHECKSUMS-SHA256.txt --clobber

      - name: Commit version bump back to main
        if: steps.semrel.outputs.released == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          RELEASE_VERSION: ${{ steps.semrel.outputs.version }}
        run: |
          # Read current main HEAD
          MAIN_SHA=$(gh api "repos/${REPO}/git/ref/heads/main" --jq '.object.sha')

          # Get current tree
          TREE_SHA=$(gh api "repos/${REPO}/git/commits/${MAIN_SHA}" --jq '.tree.sha')

          # Create blob for updated pyproject.toml
          PYPROJECT_CONTENT=$(sed "s/^version = \".*\"/version = \"${RELEASE_VERSION}\"/" pyproject.toml | base64)
          PYPROJECT_BLOB=$(gh api "repos/${REPO}/git/blobs" \
            -f content="$PYPROJECT_CONTENT" \
            -f encoding="base64" \
            --jq '.sha')

          # Create blob for updated registry.json
          REGISTRY_CONTENT=$(cat <<REGEOF | base64
          {
            "schemaVersion": "1.0",
            "versions": [
              {"version": "${RELEASE_VERSION}", "status": "current", "released": "$(date -u +%Y-%m-%d)"},
              $(gh api "repos/${REPO}/contents/src/ai_engineering/version/registry.json?ref=main" \
                --jq '.content' | base64 -d | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for v in data['versions']:
              v['status'] = 'supported'
          print(','.join(json.dumps(v) for v in data['versions']))")
            ]
          }
          REGEOF
          )
          REGISTRY_BLOB=$(gh api "repos/${REPO}/git/blobs" \
            -f content="$REGISTRY_CONTENT" \
            -f encoding="base64" \
            --jq '.sha')

          # Create new tree with both updated files
          NEW_TREE=$(gh api "repos/${REPO}/git/trees" \
            --input - <<TREEEOF | jq -r '.sha'
          {
            "base_tree": "$TREE_SHA",
            "tree": [
              {"path": "pyproject.toml", "mode": "100644", "type": "blob", "sha": "$PYPROJECT_BLOB"},
              {"path": "src/ai_engineering/version/registry.json", "mode": "100644", "type": "blob", "sha": "$REGISTRY_BLOB"}
            ]
          }
          TREEEOF
          )

          # Create commit
          NEW_COMMIT=$(gh api "repos/${REPO}/git/commits" \
            --input - <<COMMITEOF | jq -r '.sha'
          {
            "message": "chore(release): bump version to ${RELEASE_VERSION} [skip ci]",
            "tree": "$NEW_TREE",
            "parents": ["$MAIN_SHA"]
          }
          COMMITEOF
          )

          # Update main ref
          gh api "repos/${REPO}/git/refs/heads/main" \
            -X PATCH \
            -F sha="$NEW_COMMIT" \
            -F force=true

          echo "Committed version bump to ${RELEASE_VERSION} on main (${NEW_COMMIT})"

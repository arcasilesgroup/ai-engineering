name: Install Smoke

# Spec-101 install-smoke matrix.
#
# - `smoke-test`: legacy non-spec-101 smoke kept intact (build wheel, install
#   into clean venv, run wizard / dry-run / doctor) so adoption regressions on
#   the existing `ai-eng install` surface are caught.
# - `spec101-install-smoke`: new 3-OS matrix exercising spec-101 D-101-11
#   (EXIT 80/81), D-101-04 verify, D-101-07 idempotence, D-101-12
#   `python_env.mode=uv-tool`, and G-4(c) syscall evidence collection.
#   Pinned uv min/max per R-8 + T-4.6.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, "rewrite/**"]

permissions:
  contents: read

jobs:
  smoke-test:
    name: Install Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    env:
      AIENG_TEST: "1"
      # See spec101-install-smoke for the rationale -- network-bound install
      # mechanisms are short-circuited in the smoke matrix; verify probes
      # still run and assert the user-scope contract.
      AIENG_TEST_SIMULATE_INSTALL_OK: "*"
      # Smoke matrix installs from a built wheel (``pip install dist/*.whl``)
      # which lands ``ai_engineering`` in ``site-packages`` and so is NOT
      # detected as a dev build. The synthetic-OK hook refuses to fire on
      # production wheels (Wave 27 hardening). Explicitly opt the smoke
      # matrix in -- runners are CI/test scope, not real production use.
      AIENG_DEV_BUILD: "1"
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest }
          - { os: windows-latest }
          - { os: macos-latest }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - name: Build wheel
        run: uv build
      - name: Create clean venv and install package
        run: |
          python -m venv .smoke-venv
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          pip install dist/*.whl
      - name: Validate CLI version
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          VERSION_OUTPUT="$(ai-eng version)"
          echo "$VERSION_OUTPUT"
          echo "$VERSION_OUTPUT" | grep -qE '^ai-engineering [0-9]+\.[0-9]+\.[0-9]+'
      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"
      - name: Install into smoke target
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          mkdir -p smoke-target
          git init -b main smoke-target
          ai-eng install smoke-target --non-interactive
      - name: Wizard non-interactive install
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          mkdir -p smoke-wizard
          git init -b main smoke-wizard
          ai-eng install smoke-wizard --non-interactive --provider claude --vcs github
      - name: Dry-run produces JSON
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          mkdir -p smoke-dryrun
          git init -b main smoke-dryrun
          ai-eng install smoke-dryrun --dry-run --provider claude --vcs github > plan.json
          python3 -c "import json; d=json.load(open('plan.json')); assert 'plans' in d; print('OK')"
      - name: Doctor diagnostics
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          set +e
          ai-eng doctor smoke-target --json | tee doctor-output.json
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 1 ]; then
            echo "ERROR: Doctor reported failures"
            exit 1
          fi
          # Exit code 0 (all ok) or 2 (warnings only) are acceptable
          python3 -c "
          import json, sys
          data = json.load(open('doctor-output.json'))
          result = data.get('result', data)
          all_checks = [c for p in result.get('phases', []) for c in p.get('checks', [])]
          all_checks += result.get('runtime', [])
          fails = [c for c in all_checks if c['status'] == 'fail']
          warns = [c for c in all_checks if c['status'] == 'warn']
          if fails:
              for f in fails:
                  print(f'FAIL: {f[\"name\"]}: {f[\"message\"]}')
              sys.exit(1)
          print(f'Doctor: {len(warns)} warnings, 0 failures')
          "

  # Spec-101 install-smoke matrix (T-4.2 + T-4.3 + T-4.4 + T-4.5 + T-4.6).
  # Drives the clean-project fixture through the full spec-101 install path
  # and asserts EXIT 80 + remediation regex (T-4.3), idempotence + os_release
  # re-probe (T-4.5), and uploads syscall evidence (T-4.4).
  spec101-install-smoke:
    name: spec101 Install Smoke (${{ matrix.os }} / uv ${{ matrix.uv_version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        # Pin uv to declared range bounds (R-8 + T-4.6). 0.4.0 is the floor;
        # 0.9.x is the highest under the < 1.0 ceiling at spec time.
        os: [ubuntu-latest, macos-latest, windows-latest]
        uv_version: ["0.4.0", "0.9.0"]
    env:
      AIENG_TEST: "1"
      # Smoke matrix runs in clean CI runners where the real install
      # mechanism (GitHub releases download, brew tap, winget package) may
      # be unavailable or rate-limited. The synthetic-OK hook records each
      # tool as installed without invoking the network mechanism so the
      # smoke flow exercises every code path UP TO the mechanism boundary.
      AIENG_TEST_SIMULATE_INSTALL_OK: "*"
      # Smoke matrix builds a wheel and ``pip install``s it -- the resulting
      # ``site-packages`` install is classified as production by
      # ``_is_dev_build()`` (Wave 27 hardening). Explicitly opt the smoke
      # matrix in to the dev-build path so the synthetic-OK hook fires.
      AIENG_DEV_BUILD: "1"
      FIXTURE_DIR: tests/fixtures/install-smoke/clean-project
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup uv (pinned ${{ matrix.uv_version }})
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: ${{ matrix.uv_version }}
          enable-cache: true

      - name: Configure git defaults
        run: |
          git config --global init.defaultBranch main
          git config --global user.email "ci@test.com"
          git config --global user.name "CI"

      - name: Build and install ai-eng
        # ``uv build`` was added in uv 0.4.16; the matrix floor 0.4.0 lacks it.
        # Use ``python -m build`` (PEP 517) so the wheel build is uv-version
        # agnostic across the declared 0.4.0..0.9.0 matrix range.
        run: |
          python -m venv .smoke-venv
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          python -m pip install --upgrade pip build
          python -m build --wheel
          pip install dist/*.whl
          which ai-eng

      - name: Stage smoke project (clean-project fixture)
        run: |
          mkdir -p smoke-target
          cp -R "$FIXTURE_DIR"/. smoke-target/
          git init -b main smoke-target
          (cd smoke-target && git add -A && git commit -m "fixture init" --allow-empty)
          # The framework's branch-protection gate (DEC: PROTECTED_BRANCHES)
          # blocks direct commits to ``main``. The T-4.2 smoke commit MUST
          # land on a feature branch -- create it BEFORE ``ai-eng install``
          # so the post-install gate sees the feature-branch state.
          (cd smoke-target && git checkout -b smoke-feature)

      # Install gitleaks on the runner before T-4.2.
      #
      # The post-install pre-commit gate runs on the smoke commit and requires
      # gitleaks to be on PATH. macOS runners ship gitleaks via brew prebake;
      # ubuntu and windows runners do not. ``AIENG_TEST_SIMULATE_INSTALL_OK``
      # short-circuits ``ai-eng install`` (no real network mechanism) but the
      # gate runner still calls ``shutil.which("gitleaks")`` and fails when
      # the binary is absent. Provision it deterministically here so T-4.2
      # exercises the post-install commit path the spec contracts.
      - name: Install gitleaks (Ubuntu)
        if: runner.os == 'Linux'
        env:
          GITLEAKS_VERSION: "8.30.0"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Install gitleaks (Windows)
        if: runner.os == 'Windows'
        env:
          GITLEAKS_VERSION: "8.30.0"
        shell: pwsh
        run: |
          $url = "https://github.com/gitleaks/gitleaks/releases/download/v$env:GITLEAKS_VERSION/gitleaks_${env:GITLEAKS_VERSION}_windows_x64.zip"
          $zip = "$env:RUNNER_TEMP\gitleaks.zip"
          $dest = "$env:RUNNER_TEMP\gitleaks-bin"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Add-Content -Path $env:GITHUB_PATH -Value $dest
          & "$dest\gitleaks.exe" version

      # T-4.2: ai-eng install . exits 0 + git commit --allow-empty exits 0
      # (no "tool not found"). Smoke-installed tools must be runnable from
      # the hook's resolved PATH. The commit message must satisfy the
      # framework's own commit-msg-format gate (conventional commits) since
      # the install lands the gate hooks before the smoke commit runs.
      - name: T-4.2 install + smoke commit
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          (cd smoke-target && ai-eng install . --non-interactive)
          (cd smoke-target && git commit --allow-empty -m "chore: smoke commit")

      # T-4.3: env -i PATH="" ai-eng install . asserts EXIT 80 + stderr matches
      # the per-tool remediation regex (G-3 contract).
      - name: T-4.3 PATH="" probe (EXIT 80 + remediation regex)
        if: runner.os != 'Windows'
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          mkdir -p path-empty-target
          cp -R "$FIXTURE_DIR"/. path-empty-target/
          git -C path-empty-target init -b main
          set +e
          # Capture stderr; preserve PATH access only to ai-eng itself via
          # absolute path resolution from the smoke venv.
          AI_ENG_BIN="$(command -v ai-eng)"
          env -i PATH="" HOME="$HOME" "$AI_ENG_BIN" install path-empty-target --non-interactive 2>path-empty-stderr.log
          EXIT_CODE=$?
          set -e
          echo "Captured exit: $EXIT_CODE"
          cat path-empty-stderr.log || true
          # Accept both EXIT 80 (tool install failed) and EXIT 81 (prereq missing).
          # Per D-101-11 strict precedence, when env -i PATH="" wipes uv too,
          # the prereqs gate fires EXIT 81 BEFORE the tools phase can run.
          # G-3 contract is preserved: hard-fail with actionable stderr.
          if [ "$EXIT_CODE" -ne 80 ] && [ "$EXIT_CODE" -ne 81 ]; then
            echo "Expected EXIT 80 (tools) or 81 (prereq), got $EXIT_CODE"
            exit 1
          fi
          # Actionable remediation in stderr — match per-tool OR prereq install hint.
          if ! grep -Eqi '(brew install|uv tool install|winget install|curl .+-o.+local/bin|astral.sh/uv|adoptium|dotnet|go.dev|rustup)' path-empty-stderr.log; then
            echo "Stderr does not match remediation regex"
            exit 1
          fi

      - name: T-4.3 PATH="" probe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . .smoke-venv/Scripts/Activate.ps1
          New-Item -ItemType Directory -Force path-empty-target | Out-Null
          Copy-Item -Recurse -Force "$env:FIXTURE_DIR/*" path-empty-target/
          git -C path-empty-target init -b main
          $aiEng = (Get-Command ai-eng).Source
          # Empty PATH approximation on Windows — preserve HOME but drop PATH.
          $env:PATH = ""
          $proc = Start-Process -FilePath $aiEng -ArgumentList @("install","path-empty-target","--non-interactive") `
                                -RedirectStandardError path-empty-stderr.log `
                                -PassThru -Wait -NoNewWindow
          $exitCode = $proc.ExitCode
          Get-Content path-empty-stderr.log
          # Accept both EXIT 80 (tools) and EXIT 81 (prereq) per D-101-11 precedence.
          if ($exitCode -ne 80 -and $exitCode -ne 81) { throw "Expected EXIT 80 or 81, got $exitCode" }
          $stderr = Get-Content path-empty-stderr.log -Raw
          if ($stderr -notmatch '(?i)(brew install|uv tool install|winget install|curl .+-o.+local/bin|astral.sh/uv|adoptium|dotnet|go.dev|rustup)') {
            throw "Stderr does not match remediation regex"
          }

      # T-4.4 (Ubuntu): strace -f -e trace=execve captures every spawned
      # subprocess to prove user-scope only (G-4(c) evidence).
      - name: T-4.4 strace evidence (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          sudo apt-get update -qq
          sudo apt-get install -y -qq strace
          mkdir -p strace-target
          cp -R "$FIXTURE_DIR"/. strace-target/
          git -C strace-target init -b main
          strace -f -e trace=execve -o syscalls-ubuntu.log \
            ai-eng install strace-target --non-interactive || true
          # The log must mention `uv tool install` or `brew` paths but never
          # `/usr/local/bin/sudo`, `apt`, or `npm install -g`. Spot-check.
          if grep -Eq 'execve\("[^"]*/(sudo|apt|yum|dnf)' syscalls-ubuntu.log; then
            echo "Forbidden execve detected in strace log"
            grep -E 'execve\("[^"]*/(sudo|apt|yum|dnf)' syscalls-ubuntu.log
            exit 1
          fi

      - name: T-4.4 dtruss evidence (macOS, skip-with-note when unavailable)
        if: runner.os == 'macOS'
        continue-on-error: true
        timeout-minutes: 5
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          mkdir -p dtruss-target
          cp -R "$FIXTURE_DIR"/. dtruss-target/
          git -C dtruss-target init -b main
          # dtruss is unusable on GitHub-hosted macOS runners: SIP is enabled
          # (blocks dtrace probes on system binaries) and `sudo` requires an
          # interactive password prompt that never resolves, hanging the job
          # indefinitely. Skip dtruss capture and rely on Ubuntu strace for
          # G-4(c) syscall evidence; still exercise the install path here so
          # we know the macOS install works end-to-end.
          {
            echo "dtruss not usable on GitHub-hosted macOS runners (SIP-protected, sudo password required)."
            echo "G-4(c) syscall evidence is provided by the Ubuntu strace job (syscalls-ubuntu.log)."
            echo "Install path is still exercised below to confirm macOS smoke parity."
          } > syscalls-darwin.log
          ai-eng install dtruss-target --non-interactive >>syscalls-darwin.log 2>syscalls-darwin.err || true
          if [ -s syscalls-darwin.err ]; then
            cat syscalls-darwin.err >> syscalls-darwin.log
          fi
          rm -f syscalls-darwin.err

      - name: T-4.4 Process Monitor evidence (Windows, skip-with-note)
        if: runner.os == 'Windows'
        continue-on-error: true
        shell: pwsh
        run: |
          . .smoke-venv/Scripts/Activate.ps1
          New-Item -ItemType Directory -Force procmon-target | Out-Null
          Copy-Item -Recurse -Force "$env:FIXTURE_DIR/*" procmon-target/
          git -C procmon-target init -b main
          # GitHub-hosted Windows runners lack a pre-installed Process Monitor
          # and cannot run third-party kernel-level capture tools without
          # admin elevation. Record a skip-with-note artifact so reviewers see
          # the gap is intentional and tracked in the spec out-of-scope list.
          @"
          Process Monitor evidence skipped on this runner.
          GitHub-hosted Windows images do not ship procmon and elevation is
          unavailable. Tracked under spec-101 Out-of-scope: Windows-specific
          syscall evidence collection deferred. PATH=`""` probe and idempotence
          steps still run on Windows.
          "@ | Out-File -FilePath syscalls-windows.log -Encoding utf8
          ai-eng install procmon-target --non-interactive | Tee-Object -Append syscalls-windows.log

      # T-4.5: idempotence — second run must report 0 reinstalls. Synthetic
      # os_release write triggers re-probe.
      - name: T-4.5 idempotence + os_release re-probe
        if: runner.os != 'Windows'
        run: |
          . .smoke-venv/bin/activate || . .smoke-venv/Scripts/activate
          mkdir -p idemp-target
          cp -R "$FIXTURE_DIR"/. idemp-target/
          git -C idemp-target init -b main
          # Capture both stdout (JSON envelope) and stderr (skip markers
          # emitted in --non-interactive mode per Wave 28). Merging via
          # 2>&1 ensures grep sees the ``tool:<name>:<marker>`` lines that
          # now land on stderr to keep stdout JSON-pure.
          ai-eng install idemp-target --non-interactive 2>&1 | tee install-1.log
          ai-eng install idemp-target --non-interactive 2>&1 | tee install-2.log
          # Second-run output must surface a "0 reinstalls" / "skipped"
          # marker. The exact wording lands in T-2.16 — we accept either
          # `reinstall` count of 0 or an explicit `Skipped` line.
          if ! grep -Eqi '(0 reinstall|reinstalls: 0|already_installed|already-installed|already installed|skipped \(verify passed\))' install-2.log; then
            echo "Second run did not report 0 reinstalls"
            cat install-2.log
            exit 1
          fi
          # Synthetic os_release bump should invalidate skip and trigger
          # re-verify on the third run.
          STATE_FILE="idemp-target/.ai-engineering/state/install-state.json"
          if [ -f "$STATE_FILE" ]; then
            python3 -c "
          import json, pathlib
          p = pathlib.Path('$STATE_FILE')
          data = json.loads(p.read_text())
          tools = data.get('required_tools_state', {})
          for record in tools.values():
              if isinstance(record, dict):
                  record['os_release'] = '99.99'
          p.write_text(json.dumps(data, indent=2))
          "
            # Merge stderr into stdout for marker visibility (see Wave 28).
            ai-eng install idemp-target --non-interactive 2>&1 | tee install-3.log
            if ! grep -Eqi '(reverified|already_installed|already-installed|os_release.*mismatch|re-?probe|re-?verify)' install-3.log; then
              echo "Third run after os_release bump did not trigger re-probe"
              cat install-3.log
              exit 1
            fi
          else
            echo "install-state.json not found — skipping os_release re-probe assertion"
          fi

      - name: T-4.5 idempotence + os_release re-probe (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          . .smoke-venv/Scripts/Activate.ps1
          New-Item -ItemType Directory -Force idemp-target | Out-Null
          Copy-Item -Recurse -Force "$env:FIXTURE_DIR/*" idemp-target/
          git -C idemp-target init -b main
          # Merge stderr (markers per Wave 28) into the pipeline so
          # grep/regex assertions see the ``tool:<name>:<marker>`` lines.
          ai-eng install idemp-target --non-interactive 2>&1 | Tee-Object install-1.log
          ai-eng install idemp-target --non-interactive 2>&1 | Tee-Object install-2.log
          $second = Get-Content install-2.log -Raw
          if ($second -notmatch '(?i)(0 reinstall|reinstalls: 0|already_installed|already-installed|already installed|skipped \(verify passed\))') {
            throw "Second run did not report 0 reinstalls"
          }
          $stateFile = "idemp-target/.ai-engineering/state/install-state.json"
          if (Test-Path $stateFile) {
            python3 -c "
          import json, pathlib
          p = pathlib.Path('$stateFile')
          data = json.loads(p.read_text())
          tools = data.get('required_tools_state', {})
          for record in tools.values():
              if isinstance(record, dict):
                  record['os_release'] = '99.99'
          p.write_text(json.dumps(data, indent=2))
          "
            ai-eng install idemp-target --non-interactive 2>&1 | Tee-Object install-3.log
            $third = Get-Content install-3.log -Raw
            if ($third -notmatch '(?i)(reverified|already_installed|already-installed|os_release.*mismatch|re-?probe|re-?verify)') {
              throw "Third run after os_release bump did not trigger re-probe"
            }
          }

      - name: Upload syscall evidence (7-day retention)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: spec101-syscall-evidence-${{ matrix.os }}-uv${{ matrix.uv_version }}
          path: |
            syscalls-ubuntu.log
            syscalls-darwin.log
            syscalls-windows.log
            install-1.log
            install-2.log
            install-3.log
            path-empty-stderr.log
          retention-days: 7
          if-no-files-found: warn

  install-smoke:
    name: install-smoke
    if: always()
    needs: [smoke-test, spec101-install-smoke]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Evaluate smoke results
        run: |
          if [[ "${{ needs.smoke-test.result }}" != "success" ]]; then
            echo "Legacy smoke-test failed: ${{ needs.smoke-test.result }}"
            exit 1
          fi
          if [[ "${{ needs.spec101-install-smoke.result }}" != "success" ]]; then
            echo "spec101 install-smoke failed: ${{ needs.spec101-install-smoke.result }}"
            exit 1
          fi
          echo "All smoke jobs passed (legacy + spec-101)"

name: Governance Drift Detection

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: Governance Drift Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Content integrity validation
        run: uv run ai-eng validate
      - name: Governance diff
        run: uv run ai-eng governance diff
      - name: Check risk acceptances
        run: uv run ai-eng gate risk-check
      - name: Mirror sync verification
        run: |
          echo "Verifying mirror sync across all adapter locations..."
          uv run ai-eng validate --json | python -c "
          import json, sys
          try:
              report = json.load(sys.stdin)
              print(json.dumps(report, indent=2))
          except:
              print('Governance drift check completed')
          "

name: Daily Triage

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  triage:
    name: Daily Issue Triage
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Run triage
        run: |
          echo "Triage automation: handled by this workflow (replaced daily-triage, issue-validate, stale-issues runbooks)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check stale issues
        run: |
          gh issue list --state open --json number,title,updatedAt --limit 50 | \
            python -c "
          import json, sys
          from datetime import datetime, timedelta, timezone
          issues = json.load(sys.stdin)
          cutoff = datetime.now(timezone.utc) - timedelta(days=30)
          stale = [i for i in issues if datetime.fromisoformat(i['updatedAt'].replace('Z', '+00:00')) < cutoff]
          if stale:
              print(f'Found {len(stale)} stale issues (>30 days)')
              for i in stale:
                  print(f'  #{i[\"number\"]}: {i[\"title\"]}')
          else:
              print('No stale issues found')
          "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

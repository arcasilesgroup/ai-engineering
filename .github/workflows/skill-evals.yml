name: Skill Evals (regression gate)

# Sub-007 M6 D-127-07: on PRs touching .claude/skills/, run the
# skill-set regression gate. Fail loud on greater-than-5pp pass at 1
# regression.
#
# Pilot scope: invokes scripts/run_loop_skill_evals.py with the
# stub optimizer adapter so the gate path is exercised end to end.
# Full LLM-driven corpus run (46 skills, 16 cases) is deferred.
# See sub-007/plan.md Self-Report for what is in pilot vs deferred.

on:
  pull_request:
    branches: [main]
    paths:
      - '.claude/skills/**'
      - 'evals/**'
      - 'tools/skill_domain/eval_types.py'
      - 'tools/skill_app/eval_regression_gate.py'
      - 'tools/skill_app/eval_runner.py'
      - 'tools/skill_app/ports/optimizer.py'
      - 'tools/skill_app/ports/llm.py'
      - 'tools/skill_app/ports/git_log.py'
      - 'tools/skill_app/ports/lessons.py'
      - 'tools/skill_infra/skill_creator_adapter.py'
      - 'tools/skill_infra/llm_adapter.py'
      - 'tools/skill_infra/git_log_adapter.py'
      - 'tools/skill_infra/lessons_md_parser.py'
      - 'scripts/run_loop_skill_evals.py'
      - '.github/workflows/skill-evals.yml'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: skill-evals-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-gate:
    name: Skill-set regression gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --frozen
          uv pip list

      - name: Run pytest for eval-types and regression gate
        run: |
          uv run pytest tests/integration/test_eval_regression_gate.py -v

      - name: Run skill-set regression gate
        run: |
          uv run python scripts/run_loop_skill_evals.py \
            --skill all \
            --regression \
            --baseline evals/baseline.json \
            --corpus-root evals/ \
            --out regression-report.json

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-evals-regression-report
          path: regression-report.json
          retention-days: 14

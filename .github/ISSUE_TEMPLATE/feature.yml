name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in the framework.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: I'm frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches you considered.
    validations:
      required: false
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Estimated impact area.
      options:
        - Skill (single skill change)
        - Agent (agent behavior change)
        - CLI (command-line interface)
        - Installer (setup/config)
        - Standards (governance/quality)
        - Infrastructure (CI/CD, hooks)
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Diagrams, examples, or related issues.
    validations:
      required: false

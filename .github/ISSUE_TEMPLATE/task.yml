name: Task
description: Track a specific unit of work
labels: ["task", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Define a concrete, actionable task.
  - type: textarea
    id: description
    attributes:
      label: Task Description
      description: What needs to be done?
    validations:
      required: true
  - type: input
    id: spec
    attributes:
      label: Related Spec
      description: Spec identifier if applicable.
      placeholder: "036-platform-runbooks"
    validations:
      required: false
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - p1-critical
        - p2-high
        - p3-normal
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - S (< 1h)
        - M (1-4h)
        - L (4-8h)
        - XL (> 8h)
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Dependencies, blockers, or related issues.
    validations:
      required: false

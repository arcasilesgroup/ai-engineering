version: 2

# NOTE: With distribution lock (private feed only, no PyPI), Dependabot
# requires registry configuration to authenticate against your feed.
# Uncomment and configure the section below, then add "registries:"
# to the pip update entry.
#
# registries:
#   corporate-feed:
#     type: python-index
#     url: https://pkgs.dev.azure.com/ORG/PROJECT/_packaging/FEED/pypi/simple/
#     username: az
#     password: ${{ secrets.AZURE_ARTIFACTS_TOKEN }}
#
# Then add to the pip update entry:
#   registries:
#     - corporate-feed

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    labels:
      - "dependencies"
      - "python"
    open-pull-requests-limit: 5
    groups:
      python-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

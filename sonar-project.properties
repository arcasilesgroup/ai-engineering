sonar.projectKey=arcasilesgroup_ai-engineering
sonar.organization=arcasilesgroup
sonar.host.url=https://sonarcloud.io

# Quality Gate — scanner polls and fails if QG fails (D038-001)
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Sources and tests
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/*.pyc,**/__pycache__/**,**/dist/**,**/.venv/**

# Python coverage (Cobertura XML from pytest-cov, per tier)
sonar.python.coverage.reportPaths=coverage-unit.xml,coverage-integration.xml,coverage-e2e.xml
sonar.python.version=3.11

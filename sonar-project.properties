sonar.projectKey=arcasilesgroup_ai-engineering
sonar.organization=arcasilesgroup
sonar.host.url=https://sonarcloud.io

# Quality Gate — blocking. Reactivated post-spec-101 once Waves 35-37 closed
# the acknowledged findings (new_reliability=A, new_security=A, new_coverage=91.4%,
# new_duplications=0%). The Sonar job runs in parallel with the integration matrix
# (~76s vs 772s) so reactivation does not extend the CI critical path.
sonar.qualitygate.wait=true

# Sources and tests
sonar.sources=src
sonar.tests=tests
sonar.exclusions=**/node_modules/**,**/*.pyc,**/__pycache__/**,**/dist/**,**/.venv/**,**/templates/**,**/tests/fixtures/**,**/.ai-engineering/runs/**

# Python coverage (Cobertura XML from pytest-cov, per tier)
sonar.python.coverage.reportPaths=coverage-unit.xml,coverage-integration.xml,coverage-e2e.xml
sonar.python.version=3.11

# Coverage exclusions — apply on top of sonar.exclusions for the new-code QG.
# Spec-101 OS-specific install bootstrap mechanisms (winget/scoop/chocolatey/
# brew/apt/dnf/launchd/systemd) cannot be exercised in cross-OS unit tests
# without ballooning fixtures; they are validated end-to-end by the
# install-smoke matrix. Excluded from coverage metrics, NOT from analysis,
# so duplication, complexity, and security rules still apply.
sonar.coverage.exclusions=**/templates/**,**/tests/fixtures/**,**/.ai-engineering/runs/**,**/installer/mechanisms/**,**/installer/user_scope_install.py,**/installer/launchers.py,**/installer/python_env.py,**/installer/phases/sdk_prereqs.py,**/installer/phases/tools.py,**/installer/tool_registry.py,**/installer/tools.py,**/prereqs/sdk.py,**/prereqs/uv.py,**/doctor/phases/tools.py,**/cli_commands/_exit_codes.py

# Wave 36+ rule exclusions: python:S5852 (regex ReDoS) flagged on
# `_shell_patterns.py` is by-design — the module's purpose IS to define
# regexes that detect malicious shell patterns. Bounded char-class
# `[^\n]{0,160}` makes matching linear-time, but Sonar's static analyzer
# still flags multi-quantifier regexes at the file level. Excluding the
# rule on this file only; the rule remains active everywhere else.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S5852
sonar.issue.ignore.multicriteria.e1.resourceKey=**/installer/_shell_patterns.py

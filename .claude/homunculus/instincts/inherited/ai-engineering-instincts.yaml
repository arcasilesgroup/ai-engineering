# Ai Engineering Workflow Skill Or Agent Addition Or Update

## Action

Follow the skill-or-agent-addition-or-update workflow:
1. Edit or create canonical skill/agent file in .claude/skills/ or .claude/agents/
2. Run scripts/sync_command_mirrors.py or ai-eng sync to propagate changes to .agents/, .github/, and src/ai_engineering/templates/project/ mirrors
3. Update manifest.yml and instruction files (CLAUDE.md, AGENTS.md, copilot-instructions.md) to reflect new/changed skills/agents
4. Update or create handler files as needed (e.g., handlers/validate.md, handlers/review.md) in all mirrors
5. Update or create relevant tests (test_agent_schema_validation.py, test_handler_routing_completeness.py, etc.)
6. Commit all affected files across all mirrors and templates

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .claude/skills/*/SKILL.md, .claude/agents/*.md, .agents/skills/*/SKILL.md


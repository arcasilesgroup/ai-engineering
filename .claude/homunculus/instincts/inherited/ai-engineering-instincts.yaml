# Ai Engineering Workflow Sync Skill And Agent Mirrors

## Action

Follow the sync-skill-and-agent-mirrors workflow:
1. Edit or add skill/agent/handler files in .claude/ directory.
2. Run sync_command_mirrors.py script to propagate changes.
3. Update all mirrors: .agents/, .github/, templates/project/.claude/, templates/project/.agents/, templates/project/.github/
4. Stage and commit all changed files across mirrors.
5. Update instruction files (CLAUDE.md, AGENTS.md, copilot-instructions.md) if skill/agent count or structure changes.
6. Run tests to verify mirror sync and handler routing completeness.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: .claude/skills/*/SKILL.md, .claude/skills/*/handlers/*.md, .claude/agents/*.md


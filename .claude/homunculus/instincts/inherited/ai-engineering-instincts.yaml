# Ai Engineering Workflow Sync Ide Mirrors

## Action

Follow the sync-ide-mirrors workflow:
1. Edit or add canonical skill/agent/handler files in .claude/ (or canonical source dir).
2. Run or update scripts/sync_command_mirrors.py to propagate changes.
3. Regenerate all mirror files in .agents/, .github/, .codex/, .gemini/, templates/project/...
4. Update or create corresponding handler files in all mirrors.
5. Run tests/integration/test_sync_mirrors.py or similar to verify mirror parity.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~5x per month
- Files: scripts/sync_command_mirrors.py, .claude/skills/**, .claude/agents/**

